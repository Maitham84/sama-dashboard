<style>
:root, html[data-theme="dark"]{
  --bg:#0C1420; --panel:#131F2E; --panel2:#182636; --line:#23344A;
  --ink:#EAF0F7; --mut:#8DA2B8; --gold:#D9A441; --gold2:#F0C470;
  --good:#3FA372; --bad:#D9534F; --sky:#5BA8D9; --vio:#9B7ED9; --shadow:none;
}
html[data-theme="light"]{
  --bg:#F2F4F7; --panel:#FFFFFF; --panel2:#EEF2F7; --line:#D7DEE8;
  --ink:#1B2837; --mut:#5C6E82; --gold:#B07E1F; --gold2:#9A6E15;
  --good:#1E7A4E; --bad:#B8362F; --sky:#2A6FA8; --vio:#6B4FA8; --shadow:0 1px 3px rgba(20,30,45,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Arabic','Segoe UI',sans-serif;font-size:14px;transition:background .25s}
h1,h2,h3{font-family:'Tajawal','Segoe UI',sans-serif}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:1320px;margin:0 auto;padding:0 20px}
.brand{background:var(--panel);border-bottom:1px solid var(--line);padding:15px 0 12px}
.brand .wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:13px}
.logo .mark{width:46px;height:46px;border:2px solid var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px}
.logo h1{font-size:20px;font-weight:800}
.logo small{display:block;color:var(--mut);font-weight:500;font-size:11.5px;margin-top:2px}
.hctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.asof{color:var(--mut);font-size:11.5px;text-align:center}
.asof b{display:block;color:var(--gold2);font-size:14px;font-family:'Tajawal'}
.btn{background:var(--gold);color:#1a1206;border:none;border-radius:10px;font-family:'Tajawal';font-weight:800;font-size:13.5px;padding:9px 16px;cursor:pointer}
html[data-theme="light"] .btn:not(.ghost){color:#fff}
html[data-theme="light"] .btn.ghost{color:var(--mut);border-color:var(--line)}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--mut)}
#friBtn.on{background:var(--gold);border-color:var(--gold);color:#1a1206}
html[data-theme="light"] #friBtn.on{color:#fff}
.chain{display:grid;grid-template-columns:repeat(5,1fr);margin:16px 0 4px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
.chain .step{padding:13px 15px;position:relative;border-inline-start:1px solid var(--line)}
.chain .step:first-child{border-inline-start:none}
.chain .step::after{content:"◄";position:absolute;inset-inline-start:-9px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
html[dir="ltr"] .chain .step::after{content:"►"}
.chain .step:first-child::after{display:none}
.chain .lbl{color:var(--mut);font-size:11px;margin-bottom:5px}
.chain .val{font-family:'Tajawal';font-weight:800;font-size:20px}
.chain .val span{font-size:11px;color:var(--mut);font-weight:500}
.chain .step.gold .val{color:var(--gold2)}
nav{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}
nav .wrap{display:flex;gap:4px;overflow-x:auto;padding:9px 20px}
nav button{background:none;border:1px solid transparent;color:var(--mut);font-family:'Tajawal';font-weight:700;font-size:13.5px;padding:8px 14px;border-radius:10px;cursor:pointer;white-space:nowrap}
nav button.on{background:var(--panel2);border-color:var(--gold);color:var(--gold2)}
section{display:none;padding:20px 0 50px}
section.on{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:12px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow)}
.card .k{color:var(--mut);font-size:11.5px;margin-bottom:6px;line-height:1.6}
.card .v{font-family:'Tajawal';font-weight:800;font-size:23px}
.card .d{font-size:11.5px;margin-top:6px;color:var(--mut);line-height:1.8}
.up{color:var(--good)} .dn{color:var(--bad)} .gold{color:var(--gold2)}
.secthead{display:flex;align-items:baseline;gap:12px;margin:22px 0 4px;flex-wrap:wrap}
.secthead h2{font-size:16.5px;font-weight:800;color:var(--gold2)}
.secthead small{color:var(--mut)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:minmax(0,1fr)}.chain{grid-template-columns:repeat(2,minmax(0,1fr))}.chain .step::after{display:none}}
.chain{grid-template-columns:repeat(5,minmax(0,1fr))}
.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid2>*,.cards>*,.chain>*{min-width:0}
body{overflow-x:hidden}
@media(max-width:640px){
  .wrap{padding:0 12px}
  .logo h1{font-size:16px}.logo small{font-size:10.5px}.logo .mark{width:38px;height:38px;font-size:19px}
  .brand .wrap{flex-direction:column;align-items:stretch}
  .hctrl{justify-content:center}
  .btn{padding:8px 12px;font-size:12.5px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px}
  .card .v{font-size:19px}.card{padding:11px 12px}
  .chain .val{font-size:16px}.chain .step{padding:10px 11px}
  .chain .lbl{font-size:10px}
  .secthead h2{font-size:15px}
  .ch{height:240px;direction:ltr}
  .tbl{font-size:11px}.tbl th,.tbl td{padding:5px 6px}
}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
.panel h3{font-size:13.5px;margin-bottom:11px;font-weight:700}
/* ===== Power BI visuals (exec) ===== */
.card .spark{margin-top:8px;width:100%;height:36px;display:block}
.dchip{display:inline-block;font-size:11px;font-weight:800;padding:1px 8px;border-radius:999px;margin-inline-start:7px;vertical-align:2px;letter-spacing:.2px}
.dchip.up{background:rgba(56,161,105,.14);color:var(--good)}
.dchip.dn{background:rgba(214,69,69,.13);color:var(--bad)}
.grid3pb{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin:12px 0}
@media(max-width:1000px){.grid3pb{grid-template-columns:minmax(0,1fr)}}
.gaugebox{display:flex;justify-content:center;align-items:center;min-height:150px}
.gaugebox svg{width:100%;max-width:250px;height:auto}
.funbox{padding:4px 2px}
.funbox svg{width:100%;height:auto;display:block}
.ch{position:relative;height:280px}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{background:var(--panel2);color:var(--mut);font-weight:700;padding:8px 9px;text-align:center;position:sticky;top:0;z-index:2}
.tbl td{padding:6.5px 9px;border-bottom:1px solid var(--line);text-align:center}
.tbl tr:hover td{background:rgba(217,164,65,.06)}
.tscroll{max-height:430px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.pill{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px}
.pill.g{background:rgba(63,163,114,.16);color:var(--good)}
.pill.b{background:rgba(58,124,165,.15);color:#3a7ca5} .pill.r{background:rgba(217,83,79,.16);color:var(--bad)}
.pill.y{background:rgba(217,164,65,.16);color:var(--gold2)}
.search{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.search input,.search select{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:9px 13px;font-size:13px;font-family:inherit}
.search input{flex:1;min-width:220px}
.note{color:var(--mut);font-size:11.5px;margin-top:9px;line-height:1.8}
footer{border-top:1px solid var(--line);color:var(--mut);font-size:11px;padding:16px 0;text-align:center}
#fileBox{display:none;position:fixed;inset:0;background:rgba(5,10,18,.7);z-index:99;align-items:center;justify-content:center}
#fileBox .inner{background:var(--panel);border:1px solid var(--gold);border-radius:16px;padding:26px;max-width:520px;width:92%}
#fileBox h3{color:var(--gold2);margin-bottom:12px;font-size:16px}
#fileBox p{color:var(--mut);font-size:12.5px;line-height:1.9;margin-bottom:14px}
#fileBox input[type=file]{margin:8px 0;color:var(--ink);width:100%}
.okmsg{color:var(--good);font-size:12.5px;margin-top:8px}
/* bulletproof ghost-button colors (both themes) */
html[data-theme="light"] .btn.ghost{color:#3D4F63 !important;background:#EEF2F7 !important;border:1px solid #C9D3E0 !important}
html[data-theme="dark"] .btn.ghost{color:#A9BACB !important;background:transparent !important;border:1px solid #2A3C53 !important}
html[data-theme="light"] .asof{color:#5C6E82 !important}
.errmsg{color:var(--bad);font-size:12.5px;margin-top:8px}
.perbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:2px 0 12px}
.perlbl{color:var(--mut);font-size:11.5px;margin-inline-end:4px}
.fgrp{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.msdd{position:relative;display:inline-block}
.msdd-btn{padding:6px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--panel);color:var(--ink);font-size:12.5px;cursor:pointer;min-width:130px;text-align:start;display:inline-flex;align-items:center;justify-content:space-between;gap:6px}
.msdd-btn:hover{border-color:var(--gold)}
.msdd-btn .cnt{opacity:.6;font-size:11px}
.msdd-pop{position:absolute;top:calc(100% + 4px);inset-inline-start:0;z-index:200;background:var(--panel);border:1px solid var(--bd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);min-width:210px;max-height:320px;overflow:auto;padding:6px;display:none}
.msdd-pop.open{display:block}
.msdd-act{display:flex;gap:6px;padding:4px 6px 8px;border-bottom:1px solid var(--line);margin-bottom:6px}
.msdd-search{padding:2px 4px 6px}
.msdd-search .msdd-q{width:100%;box-sizing:border-box;padding:6px 9px;border:1px solid var(--bd);border-radius:7px;background:var(--panel2);color:var(--ink);font-size:12px}
.msdd-search .msdd-q:focus{outline:none;border-color:var(--gold)}
.msdd-list{max-height:230px;overflow:auto}
.msdd-act button{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--panel2);color:var(--ink);cursor:pointer}
.msdd-act button:hover{border-color:var(--gold);color:var(--gold2)}
.msdd-opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12.5px}
.msdd-opt:hover{background:var(--panel2)}
.msdd-opt input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.msdd-opt label{cursor:pointer;flex:1}
.search select,.search input.rngDate{padding:6px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--panel);color:var(--ink);font-size:12.5px}
.search .fgrp .perlbl{margin:0}
.perBtn{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:4px 12px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700}
.perBtn:hover{color:var(--ink)}
.perBtn.on,.granBtn.on{background:var(--gold);border-color:var(--gold);color:#1a1206}
.granBtn{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:4px 14px;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:700}
.granBtn:hover{color:var(--ink)}
.rngBtn{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:4px 12px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700}
.rngBtn.on{background:var(--gold);border-color:var(--gold);color:#1a1206}
html[data-theme="light"] .rngBtn.on{color:#fff}
.rngDate{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer;min-width:140px;position:relative}
.rngDate:hover{border-color:var(--gold)}
.rngDate:focus{outline:2px solid var(--gold);outline-offset:0}
/* make the native calendar picker icon large, gold, and cover the whole field so any click opens the calendar */
.rngDate::-webkit-calendar-picker-indicator{cursor:pointer;opacity:1;filter:invert(72%) sepia(38%) saturate(700%) hue-rotate(5deg) brightness(95%);width:18px;height:18px;padding:2px;position:absolute;right:6px;top:50%;transform:translateY(-50%)}
html[dir="rtl"] .rngDate::-webkit-calendar-picker-indicator{right:auto;left:6px}
html[data-theme="light"] .perBtn.on{color:#fff}
.capin{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:4px 8px;width:110px;color:var(--gold2);font-weight:700;font-family:inherit}

.loginCard{position:relative;z-index:2;width:min(380px,90vw);background:rgba(20,30,42,.82);backdrop-filter:blur(14px);
  border:1px solid rgba(217,164,65,.35);border-radius:22px;padding:34px 30px 28px;text-align:center;
  box-shadow:0 24px 70px rgba(0,0,0,.55);}
.loginLogo{width:120px;height:auto;margin:0 auto 14px;display:block;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4));}
.loginCard h2{margin:0 0 4px;color:#fff;font-size:22px;font-weight:800;}
.loginCard p{margin:0 0 22px;color:#9fb0c2;font-size:13px;}
.loginField{margin-bottom:14px;}
.loginField input{width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);
  border-radius:12px;padding:13px 15px;color:#fff;font-size:15px;font-family:inherit;transition:border .15s;}
.loginField input::placeholder{color:#8294a6;}
.loginField input:focus{outline:none;border-color:#D9A441;background:rgba(255,255,255,.09);}
.loginRemember{display:flex;align-items:center;gap:9px;justify-content:flex-start;color:#bcd;font-size:13.5px;margin:2px 2px 20px;cursor:pointer;}
.loginRemember input{width:17px;height:17px;accent-color:#D9A441;cursor:pointer;}
#loginBtn{width:100%;background:linear-gradient(180deg,#E2B254,#C8902F);border:none;border-radius:12px;
  padding:14px;color:#1a1206;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:filter .15s;}
#loginBtn:hover{filter:brightness(1.07);}
#loginBtn:active{transform:translateY(1px);}
.loginTopBar{position:absolute;top:14px;left:14px;display:flex;gap:8px;}
html[dir="rtl"] .loginTopBar{left:auto;right:14px;}
.loginTopBtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#dce6f0;border-radius:9px;padding:5px 11px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.loginTopBtn:hover{background:rgba(217,164,65,.25);border-color:#D9A441;color:#fff;}
.loginError{color:#ff8a8a;font-size:13px;margin-top:14px;min-height:18px;}
.loginLoading{color:#D9A441;font-size:13px;margin-top:12px;}
/* hide app until logged in */
body.locked .brand, body.locked nav, body.locked main, body.locked section{visibility:hidden;}
/* permission-hidden tabs */
.navHidden{display:none!important;}

.xlsxBtn{background:rgba(33,115,70,.12);border:1px solid rgba(33,115,70,.4);color:var(--green,#2a8a52);
  border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.xlsxBtn:hover{background:rgba(33,115,70,.22);border-color:var(--green,#2a8a52)}
</style>

function pbAlpha(col,a){
  if(typeof col!=='string')return col;
  const m=col.match(/^#([0-9a-f]{6})$/i);
  if(!m)return col;
  const n=parseInt(m[1],16);
  return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
}
function pbify(cfg){
  if(!cfg||!cfg.data)return cfg;
  const type=cfg.type;
  (cfg.data.datasets||[]).forEach(ds=>{
    const dt=ds.type||type;
    if(dt==='line'){
      if(ds.borderWidth==null)ds.borderWidth=2.2;
      if(ds.tension==null)ds.tension=.35;
      if(ds.pointRadius==null)ds.pointRadius=2.2;
      if(ds.pointHoverRadius==null)ds.pointHoverRadius=5;
      if(ds.fill==null){
        ds.fill=true;
        const line=ds.borderColor;
        ds.backgroundColor=ctx=>{
          const ch=ctx.chart,ar=ch.chartArea;
          if(!ar)return pbAlpha(line,.06);
          const g=ch.ctx.createLinearGradient(0,ar.top,0,ar.bottom);
          g.addColorStop(0,pbAlpha(line,.22));g.addColorStop(1,pbAlpha(line,0));
          return g;
        };
      }
    }else if(dt==='bar'){
      if(ds.borderRadius==null)ds.borderRadius=6;
      if(ds.borderSkipped==null)ds.borderSkipped=false;
      if(ds.maxBarThickness==null)ds.maxBarThickness=44;
      if(ds.borderWidth==null)ds.borderWidth=0;
    }
  });
  if(type==='doughnut'||type==='pie'){
    cfg.options=cfg.options||{};
    if(type==='doughnut'&&cfg.options.cutout==null)cfg.options.cutout='62%';
    (cfg.data.datasets||[]).forEach(ds=>{
      if(ds.borderWidth==null)ds.borderWidth=2;
      if(ds.hoverOffset==null)ds.hoverOffset=6;
      if(ds.spacing==null)ds.spacing=2;
    });
  }else{
    cfg.options=cfg.options||{};
    const sc=cfg.options.scales=cfg.options.scales||{};
    const horiz=(cfg.options.indexAxis==='y');
    const catAx=horiz?'y':'x', valAx=horiz?'x':'y';
    const soft=pbAlpha(css('--line'),.55)||css('--line');
    sc[catAx]=sc[catAx]||{}; sc[catAx].grid=Object.assign({display:false},sc[catAx].grid||{});
    sc[catAx].border=Object.assign({display:false},sc[catAx].border||{});
    sc[valAx]=sc[valAx]||{}; sc[valAx].grid=Object.assign({color:soft},sc[valAx].grid||{});
    sc[valAx].border=Object.assign({display:false},sc[valAx].border||{});
  }
  return cfg;
}

function growHtml(cur,prev,curL,prevL){
  if(!prev) return '';
  const g=cur/prev-1;
  const arrow=g>=0?`<span class="up">▲ ${Pc(g)}</span>`:`<span class="dn">▼ ${Pc(Math.abs(g))}</span>`;

}

function sparkSVG(arr,color){
  const a=(arr||[]).filter(v=>v!=null&&isFinite(v));
  if(a.length<2)return '';
  const W=120,H=36,P=3.5;
  const mn=Math.min.apply(null,a),mx=Math.max.apply(null,a),rg=(mx-mn)||1;
  const X=i=>P+i*(W-2*P)/(a.length-1), Y=v=>H-P-(v-mn)*(H-2*P)/rg;
  const pts=a.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  const lx=X(a.length-1).toFixed(1), ly=Y(a[a.length-1]).toFixed(1);
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true">'
   +'<polygon points="'+P+','+(H-P)+' '+pts+' '+(W-P)+','+(H-P)+'" fill="'+color+'" opacity="0.12"/>'
   +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>'
   +'<circle cx="'+lx+'" cy="'+ly+'" r="2.6" fill="'+color+'"/></svg>';
}
function dchip(cur,prev,d){
  if(cur==null||prev==null||!isFinite(prev)||prev===0)return '';
  const g=cur/prev-1;
  return g>=0?'<span class="dchip up">▲ '+Pc(g,d==null?1:d)+'</span>'
             :'<span class="dchip dn">▼ '+Pc(Math.abs(g),d==null?1:d)+'</span>';
}

function pbColor(r){return r==null?MUT:(r>=0.95?GREEN:(r>=0.85?GOLD:RED))}
function gaugeSVG(val){
  const MAXR=1.2, has=(val!=null&&isFinite(val));
  const v=has?Math.max(0,Math.min(val,MAXR)):0;
  const W=250,H=148,cx=125,cy=128,r=98,sw=17;
  const pt=a=>{const t=Math.PI*(1-a/MAXR);return [cx+r*Math.cos(t),cy-r*Math.sin(t)]};
  const arc=(a0,a1,col,w,cap)=>{if(a1-a0<=0.0001)return '';
    const p0=pt(a0),p1=pt(a1),large=((a1-a0)/MAXR)>0.5?1:0;
    return '<path d="M '+p0[0].toFixed(1)+' '+p0[1].toFixed(1)+' A '+r+' '+r+' 0 '+large+' 1 '+p1[0].toFixed(1)+' '+p1[1].toFixed(1)
     +'" fill="none" stroke="'+col+'" stroke-width="'+w+'"'+(cap?' stroke-linecap="round"':'')+'/>'};
  const col=pbColor(has?val:null);
  let ticks='';
  [0,0.5,1.0].forEach(a=>{const p=pt(a),po=[cx+(r+sw*0.75)*Math.cos(Math.PI*(1-a/MAXR)),cy-(r+sw*0.75)*Math.sin(Math.PI*(1-a/MAXR))];
    ticks+='<text x="'+po[0].toFixed(1)+'" y="'+(po[1]+4).toFixed(1)+'" text-anchor="middle" font-size="9.5" fill="'+MUT+'">'+Math.round(a*100)+'%</text>';});
  const mark=pt(1.0);
  return '<svg viewBox="0 0 '+W+' '+H+'" role="img">'
   +arc(0,MAXR,css('--line'),sw,true)
   +arc(0,v,col,sw,true)
   +'<circle cx="'+mark[0].toFixed(1)+'" cy="'+mark[1].toFixed(1)+'" r="2.6" fill="'+MUT+'"/>'
   +ticks
   +'<text x="'+cx+'" y="'+(cy-14)+'" text-anchor="middle" font-size="30" font-weight="800" fill="'+(has?col:MUT)+'" font-family="Tajawal,sans-serif" class="num">'+(has?Pc(val,1):'—')+'</text>'
   +'</svg>';
}
function funnelSVG(items){
  const W=340,rowH=46,gap=16,PADX=6;
  const n=items.length,H=n*rowH+(n-1)*gap;
  const mx=Math.max.apply(null,items.map(i=>i.v||0))||1;
  const base=items[0]&&items[0].v>0?items[0].v:null;
  const wOf=v=>Math.max(28,(v||0)/mx*(W-2*PADX));
  let s='<svg viewBox="0 0 '+W+' '+H+'" role="img">';
  items.forEach((it,i)=>{
    const y=i*(rowH+gap), w=wOf(it.v), x=(W-w)/2;
    if(i>0){const wp=wOf(items[i-1].v),xp=(W-wp)/2,yp=y-gap;
      s+='<polygon points="'+xp.toFixed(1)+','+yp+' '+(xp+wp).toFixed(1)+','+yp+' '+(x+w).toFixed(1)+','+y+' '+x.toFixed(1)+','+y+'" fill="'+it.color+'" opacity="0.16"/>';}
    s+='<rect x="'+x.toFixed(1)+'" y="'+y+'" width="'+w.toFixed(1)+'" height="'+rowH+'" rx="7" fill="'+it.color+'" opacity="0.88"/>';
    const share=(base&&i>0)?'  ·  '+Pc(it.v/base,1):'';
    s+='<text x="'+(W/2)+'" y="'+(y+rowH/2-3)+'" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">'+it.label+'</text>';
    s+='<text x="'+(W/2)+'" y="'+(y+rowH/2+13)+'" text-anchor="middle" font-size="12.5" font-weight="800" fill="#fff" class="num">'+F(it.v)+share+'</text>';
  });
  return s+'</svg>';
}

// Rebuild Whole Bird weight-class rows from per-SKU daily series within a date range.
// Returns rows shaped like DATA.wb.rows (t,w,live,sku,s,o,p,birds,birdsO,birdsP) but cropped to [from,to].
function wbRowsForRange(from,to,ownF,famF){
  if(!SKU_DATES.length)return null;
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  const idx=[]; SKU_DATES.forEach((d,i)=>{if(inR(d))idx.push(i);});
  if(!idx.length)return null;
  const map={};  // key = type|w
  (DATA.sku||[]).filter(p=>p.cat==='Whole Bird'&&(!ownF||ownF==='all'||classifyOwn(p)===ownF)&&msPass(p.fam||'—', famF)).forEach(p=>{
    const w=p.wt, tp=detectType(p), pcs=p.pcs||0;
    let s=0,o=0,pr=0;
    idx.forEach(i=>{s+=(p.dS&&p.dS[i]||0);o+=(p.dO&&p.dO[i]||0);pr+=(p.dP&&p.dP[i]||0);});
    const key=tp+'|'+w;
    if(!map[key])map[key]={t:tp,w,live:Math.round(w/DRESS),sku:0,s:0,o:0,p:0,birds:0,birdsO:0,birdsP:0};
    const e=map[key]; e.sku++; e.s+=s; e.o+=o; e.p+=pr;
    e.birds+=s*pcs; e.birdsO+=o*pcs; e.birdsP+=pr*pcs;
  });
  return Object.values(map).filter(e=>e.s||e.o||e.p).map(e=>{
    ['s','o','p','birds','birdsO','birdsP'].forEach(k=>e[k]=Math.round(e[k]));
    e.ful=e.o>0?+(e.s/e.o).toFixed(3):null; e.stk=0; e.sL=0;
    return e;
  });
}

// ===== Fresh/Frozen engine: per-category fresh vs frozen, metric+date+own filterable =====
function computeFreshFrozen(from,to,metric,ownF,catArr){
  if(!SKU_DATES.length)return null;
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  const idx=[]; SKU_DATES.forEach((d,i)=>{if(inR(d))idx.push(i);});
  if(!idx.length)return null;
  const dKey=metric==='p'?'dP':metric==='o'?'dO':'dS';
  let sku=(DATA.sku||[]);
  if(ownF&&ownF!=='all') sku=sku.filter(p=>classifyOwn(p)===ownF);
  sku=sku.filter(p=>msPass(p.cat, catArr));
  // aggregate per category: fresh total, frozen total
  const catAgg={};
  sku.forEach(p=>{
    const tp=detectType(p), cat=p.cat||'—';
    let v=0; const arr=p[dKey]; if(arr){idx.forEach(i=>{v+=(arr[i]||0);});}
    if(!catAgg[cat])catAgg[cat]={cat,f:0,z:0,fBirds:0,zBirds:0,nF:0,nZ:0};
    const e=catAgg[cat];
    if(tp==='Frozen'){e.z+=v;e.zBirds+=v*(p.pcs||0);if(v>0)e.nZ++;}
    else{e.f+=v;e.fBirds+=v*(p.pcs||0);if(v>0)e.nF++;}
  });
  const cats=Object.values(catAgg).map(e=>({...e,f:Math.round(e.f),z:Math.round(e.z),tot:Math.round(e.f+e.z),
    fPct:(e.f+e.z)?e.f/(e.f+e.z):null})).filter(e=>e.tot>0).sort((a,b)=>b.tot-a.tot);
  // daily/period trend for the whole selection (fresh vs frozen over time)
  const trend=idx.map(i=>{let f=0,z=0;sku.forEach(p=>{const v=(p[dKey]&&p[dKey][i])||0;if(detectType(p)==='Frozen')z+=v;else f+=v;});
    return {d:SKU_DATES[i],f:Math.round(f),z:Math.round(z)};});
  const totF=cats.reduce((a,c)=>a+c.f,0), totZ=cats.reduce((a,c)=>a+c.z,0);
  return {cats,trend,totF,totZ,tot:totF+totZ,from:SKU_DATES[idx[0]],to:SKU_DATES[idx[idx.length-1]],days:idx.length};
}

// ===== Reusable multi-select checkbox dropdown =====
// containerId: the element to render into. options: [[value,label],...]
// selected: array of selected values ([] or null = ALL). onChange(newSelectedArray).
// allLabel: text shown when nothing/all selected.
function msDropdown(containerId, options, selected, onChange, allLabel, searchable){
  const el=document.getElementById(containerId); if(!el)return;
  const sel=Array.isArray(selected)?selected.slice():[];
  const isAll=sel.length===0; // empty = all
  const lbl=isAll?(allLabel||'الكل'):(sel.length===1?(options.find(o=>o[0]===sel[0])||[null,sel[0]])[1]:sel.length+' '+(LANG==='ar'?'محدد':'selected'));
  const btnId=containerId+'_btn', popId=containerId+'_pop';
  // auto-enable search for long lists
  const useSearch = (searchable!==false) && (searchable===true || options.length>8);
  // preserve open state across re-renders (so multi-select keeps the menu open)
  const wasOpen = el.querySelector('.msdd-pop.open')!=null || el.dataset.keepOpen==='1';
  const prevQuery = el.dataset.q || '';
  el.classList.add('msdd');
  const oid=v=>containerId+'_o_'+btoa(unescape(encodeURIComponent(String(v)))).replace(/=/g,'');
  el.innerHTML=`<button type="button" class="msdd-btn" id="${btnId}"><span class="lbl">${lbl}</span><span class="cnt">▾</span></button>`+
    `<div class="msdd-pop${wasOpen?' open':''}" id="${popId}">`+
    (useSearch?`<div class="msdd-search"><input type="text" class="msdd-q" placeholder="${LANG==='ar'?'بحث…':'Search…'}" value="${String(prevQuery).replace(/"/g,'&quot;')}"></div>`:'')+
    `<div class="msdd-act"><button type="button" data-act="all">${LANG==='ar'?'الكل':'All'}</button><button type="button" data-act="none">${LANG==='ar'?'مسح':'Clear'}</button></div>`+
    `<div class="msdd-list">`+
    options.map(([v,l])=>`<div class="msdd-opt" data-lbl="${String(l).toLowerCase().replace(/"/g,'&quot;')}" data-val="${String(v).toLowerCase().replace(/"/g,'&quot;')}"><input type="checkbox" id="${oid(v)}" value="${String(v).replace(/"/g,'&quot;')}" ${(!isAll&&sel.includes(v))?'checked':''}><label for="${oid(v)}">${l}</label></div>`).join('')+
    `</div></div>`;
  const btn=document.getElementById(btnId), pop=document.getElementById(popId);
  btn.onclick=(e)=>{e.stopPropagation();
    const willOpen=!pop.classList.contains('open');
    document.querySelectorAll('.msdd-pop.open').forEach(p=>{if(p!==pop){p.classList.remove('open'); const pc=p.closest('.msdd'); if(pc)pc.dataset.keepOpen='0';}});
    pop.classList.toggle('open');
    el.dataset.keepOpen = willOpen?'1':'0';
    if(willOpen){const q=pop.querySelector('.msdd-q'); if(q){setTimeout(()=>q.focus(),0);}}
  };
  pop.onclick=(e)=>e.stopPropagation();
  // live search filter (no re-render — just hide/show options)
  const qbox=pop.querySelector('.msdd-q');
  if(qbox){
    const applyQ=()=>{const q=(qbox.value||'').toLowerCase().trim(); el.dataset.q=qbox.value||'';
      pop.querySelectorAll('.msdd-opt').forEach(o=>{const hit=!q||o.dataset.lbl.includes(q)||o.dataset.val.includes(q); o.style.display=hit?'':'none';});};
    qbox.oninput=()=>{el.dataset.keepOpen='1';applyQ();};
    qbox.onclick=e=>e.stopPropagation();
    if(prevQuery)applyQ();
  }
  const getSel=()=>Array.from(pop.querySelectorAll('input[type=checkbox]')).filter(c=>c.checked).map(c=>c.value);
  pop.querySelectorAll('input[type=checkbox]').forEach(c=>{c.onchange=()=>{el.dataset.keepOpen='1';onChange(getSel());};});
  pop.querySelectorAll('.msdd-act button').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();
    el.dataset.keepOpen='1';
    // when searching, "all"/"none" act on VISIBLE options only
    const checks=Array.from(pop.querySelectorAll('.msdd-opt')).filter(o=>o.style.display!=='none').map(o=>o.querySelector('input'));
    if(b.dataset.act==='all'){checks.forEach(c=>c.checked=true);}
    else{checks.forEach(c=>c.checked=false);}
    onChange(getSel());};});
}

// metricKey: 'dP' (production) | 'dS' (sales) | 'dO' (orders)

// ============== INVENTORY ANALYSIS ENGINE (days-of-supply / turnover / dead stock) ==============
// For each product: current stock (latest close in range), avg daily sales over the period,
// days-of-supply = stock / avgDailySales, turnover = periodSales / avgStock, dead-stock flag.
function computeInventory(from, to, F, deadDays){
  if(!SKU_DATES.length)return null;
  F=F||{}; deadDays=deadDays||14;
  const idxs=[]; SKU_DATES.forEach((d,i)=>{ if((!from||d>=from)&&(!to||d<=to)) idxs.push(i); });
  if(!idxs.length)return {rows:[],nDays:0,from:null,to:null};
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat, F.cat));
  sku=sku.filter(p=>msPass(p.fam||'—', F.fam));
  if(F.ff&&F.ff!=='all') sku=sku.filter(p=>detectType(p)===F.ff);
  if(F.own&&F.own!=='all') sku=sku.filter(p=>classifyOwn(p)===F.own);
  if(F.pack&&F.pack!=='all') sku=sku.filter(p=>packType(p.n)===F.pack);
  if(F.wt&&F.wt.length) sku=sku.filter(p=>F.wt.includes(String(p.wt||'')));
  if(F.brand&&F.brand.length) sku=sku.filter(p=>F.brand.includes(String(p.brand||'—')));
  if(F.prod&&F.prod.length) sku=sku.filter(p=>F.prod.includes(String(p.c)));
  const nDays=idxs.length;
  const rows=[];
  const todayIso=SKU_DATES[idxs[idxs.length-1]];
  sku.forEach(p=>{
    const dC=p.dC||[], dS=p.dS||[];
    const bk=prodBoxKg(p)||0;
    // current stock = latest non-null close stock within the range
    let curStock=0, curIdx=-1;
    for(let k=idxs.length-1;k>=0;k--){ const i=idxs[k]; if(dC[i]!=null && dC[i]>0){ curStock=dC[i]; curIdx=i; break; } }
    // period sales (boxes) + avg stock (avg of non-zero closes)
    let salesBoxes=0, stockSum=0, stockCnt=0, lastSaleIdx=-1;
    idxs.forEach(i=>{ const s=dS[i]||0; salesBoxes+=s; if(s>0)lastSaleIdx=i;
      const c=dC[i]; if(c!=null&&c>0){stockSum+=c;stockCnt++;} });
    const avgStock = stockCnt?stockSum/stockCnt:0;
    const avgDailySales = nDays?salesBoxes/nDays:0;
    const dos = avgDailySales>0 ? curStock/avgDailySales : (curStock>0?999:0); // days of supply
    const turnover = avgStock>0 ? salesBoxes/avgStock : 0;
    // days since last sale (dead stock indicator)
    let daysSinceSale = lastSaleIdx>=0 ? (idxs.length-1 - idxs.indexOf(lastSaleIdx)) : nDays;
    const isDead = curStock>0 && (lastSaleIdx<0 || daysSinceSale>=deadDays);
    const isLow  = curStock>0 && avgDailySales>0 && dos<7;   // low: less than a week of supply
    if(curStock>0 || salesBoxes>0){
      rows.push({code:p.c,name:p.n,nameAr:p.nAr||'',cat:p.cat,fam:p.fam||'—',typ:detectType(p),own:classifyOwn(p),brand:String(p.brand||'—'),
        boxKg:+bk.toFixed(2), curStock:Math.round(curStock), curStockKg:Math.round(curStock*bk),
        avgDailySales:+avgDailySales.toFixed(1), salesBoxes:Math.round(salesBoxes),
        dos:dos>=999?999:+dos.toFixed(1), turnover:+turnover.toFixed(2),
        avgStock:Math.round(avgStock), daysSinceSale, isDead, isLow});
    }
  });
  // summary
  const totStockBoxes=rows.reduce((a,r)=>a+r.curStock,0), totStockKg=rows.reduce((a,r)=>a+r.curStockKg,0);
  const deadRows=rows.filter(r=>r.isDead), lowRows=rows.filter(r=>r.isLow);
  const deadKg=deadRows.reduce((a,r)=>a+r.curStockKg,0);
  const avgTurnover = rows.length?rows.reduce((a,r)=>a+r.turnover,0)/rows.length:0;
  return {rows, nDays, from:SKU_DATES[idxs[0]], to:todayIso,
    totStockBoxes, totStockKg, nProducts:rows.length,
    deadCount:deadRows.length, deadKg, lowCount:lowRows.length,
    avgTurnover:+avgTurnover.toFixed(2), deadDays};
}

  if(CMP_F.wt&&CMP_F.wt.length) sku=sku.filter(p=>CMP_F.wt.includes(String(p.wt||'')));
  if(CMP_F.brand&&CMP_F.brand.length) sku=sku.filter(p=>CMP_F.brand.includes(String(p.brand||'—')));
  if(CMP_F.prod&&CMP_F.prod.length) sku=sku.filter(p=>CMP_F.prod.includes(String(p.c)));

  let oB=0,pB=0,sB=0,oK=0,pK=0,sK=0;

      oB+=o;pB+=pr;sB+=s; oK+=o*bk;pK+=pr*bk;sK+=s*bk;});});
  return {oB:Math.round(oB),pB:Math.round(pB),sB:Math.round(sB),

}

function computeCmpFiltered(from, to, Flt){
  if(!SKU_DATES.length)return null;
  Flt=Flt||{};
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat, Flt.cat));
  sku=sku.filter(p=>msPass(p.fam||'—', Flt.fam));

  if(Flt.own&&Flt.own!=='all') sku=sku.filter(p=>classifyOwn(p)===Flt.own);
  if(Flt.pack&&Flt.pack!=='all') sku=sku.filter(p=>packType(p.n)===Flt.pack);
  if(Flt.wt&&Flt.wt.length) sku=sku.filter(p=>Flt.wt.includes(String(p.wt||'')));
  if(Flt.brand&&Flt.brand.length) sku=sku.filter(p=>Flt.brand.includes(String(p.brand||'—')));
  if(Flt.prod&&Flt.prod.length) sku=sku.filter(p=>Flt.prod.includes(String(p.c)));
  // per-day totals in WEIGHT (kg)
  const nD=SKU_DATES.length;
  const dO=new Array(nD).fill(0), dP=new Array(nD).fill(0), dS=new Array(nD).fill(0);
  sku.forEach(p=>{const bk=prodBoxKg(p)||0;
    const so=p.dO||[],sp=p.dP||[],ss=p.dS||[];
    for(let i=0;i<nD;i++){ dO[i]+=(so[i]||0)*bk; dP[i]+=(sp[i]||0)*bk; dS[i]+=(ss[i]||0)*bk; }});
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  // daily series
  const daily=[];
  SKU_DATES.forEach((d,i)=>{ if(!inR(d))return; daily.push({d, o:Math.round(dO[i]), p:Math.round(dP[i]), s:Math.round(dS[i])}); });
  // weekly series (company week Saturday-start)
  const wmap={};
  SKU_DATES.forEach((d,i)=>{ if(!inR(d))return;
    const dt=new Date(d+'T00:00:00Z'); const wd=(dt.getUTCDay()+1)%7; const sat=new Date(dt); sat.setUTCDate(dt.getUTCDate()-wd);
    const k=sat.toISOString().slice(0,10);
    if(!wmap[k])wmap[k]={frm:k,o:0,p:0,s:0};
    wmap[k].o+=dO[i]; wmap[k].p+=dP[i]; wmap[k].s+=dS[i]; });
  const weekly=Object.keys(wmap).sort().map(k=>({frm:k,o:Math.round(wmap[k].o),p:Math.round(wmap[k].p),s:Math.round(wmap[k].s)}));
  const tot=daily.reduce((a,r)=>({o:a.o+r.o,p:a.p+r.p,s:a.s+r.s}),{o:0,p:0,s:0});
  return {daily, weekly, tot, nProducts:sku.length};
}


// ============== OPENING / CLOSING BALANCE HELPER ==============
// For a set of products over [from,to]: opening balance = Open Stock at the FIRST in-range day,
// closing balance = Close Stock at the LAST in-range day that has balances. Returns boxes + kg.
function computeOpenClose(sku, from, to){
  if(!SKU_DATES.length) return {openBox:0,openKg:0,closeBox:0,closeKg:0,openDate:null,closeDate:null};
  const idxs=[]; SKU_DATES.forEach((d,i)=>{ if((!from||d>=from)&&(!to||d<=to)) idxs.push(i); });
  if(!idxs.length) return {openBox:0,openKg:0,closeBox:0,closeKg:0,openDate:null,closeDate:null};
  // opening: first in-range day that has any open-stock balances (dK), else fall back to first day
  let openIdx=-1;
  for(let k=0;k<idxs.length;k++){ const i=idxs[k];
    if(sku.some(p=>(p.dK&&p.dK[i]>0)||(p.dC&&p.dC[i]>0))){ openIdx=i; break; } }
  if(openIdx<0) openIdx=idxs[0];
  // closing: last in-range day that has any close-stock balances (dC), else last day
  let closeIdx=-1;
  for(let k=idxs.length-1;k>=0;k--){ const i=idxs[k];
    if(sku.some(p=>(p.dC&&p.dC[i]>0)||(p.dK&&p.dK[i]>0))){ closeIdx=i; break; } }
  if(closeIdx<0) closeIdx=idxs[idxs.length-1];
  let openBox=0,openKg=0,closeBox=0,closeKg=0;
  sku.forEach(p=>{ const bk=prodBoxKg(p)||0;
    const ob=(p.dK&&p.dK[openIdx]!=null&&p.dK[openIdx]>0)?p.dK[openIdx]:((p.dC&&p.dC[openIdx])||0);
    const cb=(p.dC&&p.dC[closeIdx]!=null&&p.dC[closeIdx]>0)?p.dC[closeIdx]:((p.dK&&p.dK[closeIdx])||0);
    openBox+=ob; openKg+=ob*bk; closeBox+=cb; closeKg+=cb*bk; });
  return {openBox:Math.round(openBox),openKg:Math.round(openKg),closeBox:Math.round(closeBox),closeKg:Math.round(closeKg),
    openDate:SKU_DATES[openIdx],closeDate:SKU_DATES[closeIdx]};
}

  if(openIdx<0)openIdx=idxs[0];
  let closeIdx=-1;
  for(let k=idxs.length-1;k>=0;k--){ const i=idxs[k]; if((p.dC&&p.dC[i]>0)||(p.dK&&p.dK[i]>0)){closeIdx=i;break;} }
  if(closeIdx<0)closeIdx=idxs[idxs.length-1];
  const ob=(p.dK&&p.dK[openIdx]!=null&&p.dK[openIdx]>0)?p.dK[openIdx]:((p.dC&&p.dC[openIdx])||0);

function computeFlow(metricKey, from, to, F, gran){
  if(!SKU_DATES.length)return null;
  F=F||{};
  // resolve date-index range
  const idxs=[];
  SKU_DATES.forEach((d,i)=>{ if((!from||d>=from)&&(!to||d<=to)) idxs.push(i); });
  if(!idxs.length)return {from,to,rows:[],cats:[],totBoxes:0,totKg:0,totUnits:0,nProducts:0,nDays:0};
  let sku=(DATA.sku||[]).slice();
  // filters (multi-select arrays: empty = all)
  sku=sku.filter(p=>msPass(p.cat, F.cat));
  sku=sku.filter(p=>msPass(p.fam||'—', F.fam));
  if(F.ff&&F.ff!=='all') sku=sku.filter(p=>detectType(p)===F.ff);
  if(F.own&&F.own!=='all') sku=sku.filter(p=>classifyOwn(p)===F.own);
  if(F.pack&&F.pack!=='all') sku=sku.filter(p=>packType(p.n)===F.pack);
  if(F.wt&&F.wt.length) sku=sku.filter(p=>F.wt.includes(String(p.wt||'')));
  if(F.brand&&F.brand.length) sku=sku.filter(p=>F.brand.includes(String(p.brand||'—')));
  if(F.prod&&F.prod.length) sku=sku.filter(p=>F.prod.includes(String(p.c)));
  const rows=[];
  sku.forEach(p=>{
    const arr=p[metricKey]||[];
    let boxes=0; idxs.forEach(i=>{boxes+=(arr[i]||0);});
    if(boxes>0){
      const boxKg=prodBoxKg(p)||0;
      const pcs=p.pcs||0;
      const units=Math.round(boxes*pcs);
      const nd=idxs.length||1;
      rows.push({code:p.c,name:p.n,nameAr:p.nAr||'',cat:p.cat,fam:p.fam||'—',sub:p.sub||'—',typ:detectType(p),pack:packType(p.n),
        own:classifyOwn(p), brand:String(p.brand||'—'), pcs, unitG:p.wt||0, boxKg:+(boxKg).toFixed(2),
        boxes:Math.round(boxes), units, kg:Math.round(boxes*boxKg),
        avgKg:Math.round(boxes*boxKg/nd), avgBoxes:+(boxes/nd).toFixed(1), avgUnits:Math.round(units/nd)});
    }
  });
  rows.sort((a,b)=>b.kg-a.kg);
  // category rollup
  const catAgg={};
  rows.forEach(r=>{if(!catAgg[r.cat])catAgg[r.cat]={cat:r.cat,boxes:0,kg:0,units:0,n:0};
    const e=catAgg[r.cat];e.boxes+=r.boxes;e.kg+=r.kg;e.units+=r.units;e.n++;});
  const cats=Object.values(catAgg).sort((a,b)=>b.kg-a.kg);
  const totBoxes=rows.reduce((a,r)=>a+r.boxes,0), totKg=rows.reduce((a,r)=>a+r.kg,0), totUnits=rows.reduce((a,r)=>a+r.units,0);
  // total time-series (weight) over the period, bucketed by granularity (day/week/month)
  const g=gran||'day';
  // build a combined daily total weight array aligned to SKU_DATES
  const dailyKg=new Array(SKU_DATES.length).fill(0);
  sku.forEach(p=>{const arr=p[metricKey]||[]; const bk=prodBoxKg(p)||0; idxs.forEach(i=>{ dailyKg[i]+=(arr[i]||0)*bk; });});
  const series=bucketSeries(dailyKg, g, from, to).map(e=>({k:e.k, v:Math.round(e.v)}));
  return {from:SKU_DATES[idxs[0]], to:SKU_DATES[idxs[idxs.length-1]], rows, cats, totBoxes, totKg, totUnits,
    nProducts:rows.length, nDays:idxs.length, series, gran:g};
}

function computeDailyProduction(asofDate, catArr, famArr, ffF, ownF, packF){
  if(!SKU_DATES.length)return null;

  if(asofDate){ idx=-1; for(let i=0;i<SKU_DATES.length;i++){ if(SKU_DATES[i]<=asofDate) idx=i; else break; } if(idx<0)idx=0; }
  const asof=SKU_DATES[idx]||null;
  let sku=(DATA.sku||[]).slice();

  sku=sku.filter(p=>msPass(p.fam||'—', famArr));

  const rows=[];

      rows.push({code:p.c,name:p.n,nameAr:p.nAr||'',cat:p.cat,fam:p.fam||'—',sub:p.sub||'—',typ:detectType(p),pack:packType(p.n),
        own:classifyOwn(p), boxes:Math.round(prod), kg:Math.round(prod*boxKg),
        unitG, pcs, birds, boxKg:+(boxKg).toFixed(2)});
    }
  });
  rows.sort((a,b)=>b.kg-a.kg);
  // category rollup
  const catAgg={};
  rows.forEach(r=>{if(!catAgg[r.cat])catAgg[r.cat]={cat:r.cat,boxes:0,kg:0,birds:0,n:0};
    const e=catAgg[r.cat];e.boxes+=r.boxes;e.kg+=r.kg;e.birds+=r.birds;e.n++;});

  return {asof, idx, rows, cats, totBoxes, totKg, totBirds, nProducts:rows.length};

function computeStockAsOf(asofDate, catF, famF, ffF, ownF, balF){
  if(!SKU_DATES.length)return null;
  // find the index in SKU_DATES on/before asofDate (the as-of snapshot)
  let idx=SKU_DATES.length-1;  // default latest
  if(asofDate){
    idx=-1;
    for(let i=0;i<SKU_DATES.length;i++){ if(SKU_DATES[i]<=asofDate) idx=i; else break; }
    if(idx<0)idx=0;
  }
  const asof=SKU_DATES[idx]||null;
  const closeDate=asof;  // closing balance is for the SAME selected day (from Close Stock sheet)
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat, catF));
  sku=sku.filter(p=>msPass(p.fam||'—', famF));

  if(ownF&&ownF!=='all') sku=sku.filter(p=>classifyOwn(p)===ownF);
  const rows=[];
  sku.forEach(p=>{
    const openBal=(p.dK&&p.dK[idx]!=null)?p.dK[idx]:0;       // opening balance (Open Stock sheet)
    const closeBal=(p.dC&&p.dC[idx]!=null)?p.dC[idx]:openBal; // closing balance (Close Stock sheet, same day)
    // balance-status filter: 'has' = has balance, 'none' = zero balance, 'all' = everything
    const hasBal=closeBal>0;
    if(balF==='none'){ if(hasBal)return; }       // only zero-balance products
    else if(balF==='all'){ /* keep all */ }
    else { if(!hasBal)return; }                   // default 'has': only products with balance
    const boxKg=prodBoxKg(p)||0;
    rows.push({code:p.c,name:p.n,nameAr:p.nAr||'',cat:p.cat,fam:p.fam||'—',sub:p.sub||'—',typ:detectType(p),pack:packType(p.n),
      openBal:Math.round(openBal), bal:Math.round(closeBal), kg:Math.round(closeBal*boxKg), openKg:Math.round(openBal*boxKg)});
  });
  rows.sort((a,b)=>b.bal-a.bal);
  // category rollup
  const catAgg={};
  rows.forEach(r=>{if(!catAgg[r.cat])catAgg[r.cat]={cat:r.cat,bal:0,kg:0,n:0};catAgg[r.cat].bal+=r.bal;catAgg[r.cat].kg+=r.kg;catAgg[r.cat].n++;});
  const cats=Object.values(catAgg).sort((a,b)=>b.bal-a.bal);
  const totBal=rows.reduce((a,r)=>a+r.bal,0), totKg=rows.reduce((a,r)=>a+r.kg,0);
  const totOpenBal=rows.reduce((a,r)=>a+r.openBal,0), totOpenKg=rows.reduce((a,r)=>a+r.openKg,0);
  // previous-day closing total (for change indicator) — uses SAME filters, on the prior index
  let prevBal=null, prevKg=null, prevDate=null;
  if(idx>0){
    const pIdx=idx-1; prevDate=SKU_DATES[pIdx];
    let pb=0,pk=0;
    // re-filter the same sku set, read prior day's CLOSING (= this day's opening = dK[idx])
    let psku=(DATA.sku||[]).slice();
    psku=psku.filter(p=>msPass(p.cat, catF));
    psku=psku.filter(p=>msPass(p.fam||'—', famF));
    if(ffF&&ffF!=='all') psku=psku.filter(p=>detectType(p)===ffF);
    if(ownF&&ownF!=='all') psku=psku.filter(p=>classifyOwn(p)===ownF);
    psku.forEach(p=>{ const pv=(p.dC&&p.dC[pIdx]!=null)?p.dC[pIdx]:((p.dK&&p.dK[pIdx]!=null)?p.dK[pIdx]:0); const bk=prodBoxKg(p)||0; pb+=pv; pk+=pv*bk; });
    prevBal=Math.round(pb); prevKg=Math.round(pk);
  }
  return {asof, closeDate, prevDate, idx, rows, cats, totBal, totKg, totOpenBal, totOpenKg, prevBal, prevKg, nProducts:rows.length};
}

// ============== TRENDS & SEASONALITY ENGINE ==============
// metric: 'dS'/'dP'/'dO'. Returns time-series (bucketed), weekday pattern, month-over-month, and trend slope.





// ============== OPERATIONAL EFFICIENCY ENGINE ==============
// Combines receiving (rx) data — received count, DOA, slaughtered, bird weight, line loads —
// with daily production weight (from sku dP × boxKg) to derive yield, DOA rate, and line efficiency.
function computeOpsEff(from, to){
  const rx = DATA.rx;
  if(!rx || !rx.daily || !rx.daily.length) return null;
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  // build per-day production weight (kg) map from sku daily production
  const prodKgByDate={};
  if(SKU_DATES&&SKU_DATES.length){
    (DATA.sku||[]).forEach(p=>{const bk=prodBoxKg(p)||0; const arr=p.dP||[];
      for(let i=0;i<SKU_DATES.length;i++){const d=SKU_DATES[i]; const v=arr[i]||0; if(v){prodKgByDate[d]=(prodKgByDate[d]||0)+v*bk;}}});
  }
  const rows=[];
  rx.daily.forEach(e=>{ if(!inR(e.d))return;
    const qty=e.v||0, doa=e.doa||0, sl=e.sl||0, awt=e.awt||0;
    const liveKg = awt>0 ? qty*awt : 0;                 // live weight received (kg)
    const prodKg = prodKgByDate[e.d]||0;                // production output weight (kg) same day
    const yieldPct = liveKg>0 ? prodKg/liveKg*100 : null;  // dressing/processing yield
    const doaPct = qty>0 ? doa/qty*100 : null;          // dead-on-arrival rate
    const slGap = qty>0 ? (qty-doa-sl) : 0;             // received minus DOA minus slaughtered (unprocessed)
    rows.push({d:e.d, qty, doa, sl, awt, liveKg:Math.round(liveKg), prodKg:Math.round(prodKg),
      yieldPct: yieldPct==null?null:+yieldPct.toFixed(1), doaPct: doaPct==null?null:+doaPct.toFixed(2),
      slGap, l1:e.l1||0, l2:e.l2||0, br:e.br||0});
  });
  if(!rows.length)return {rows:[],nDays:0,from:null,to:null};
  // summary
  const totQty=rows.reduce((a,r)=>a+r.qty,0), totDoa=rows.reduce((a,r)=>a+r.doa,0), totSl=rows.reduce((a,r)=>a+r.sl,0);
  const totLiveKg=rows.reduce((a,r)=>a+r.liveKg,0), totProdKg=rows.reduce((a,r)=>a+r.prodKg,0);
  const totL1=rows.reduce((a,r)=>a+r.l1,0), totL2=rows.reduce((a,r)=>a+r.l2,0), totBr=rows.reduce((a,r)=>a+r.br,0);
  const avgYield = totLiveKg>0 ? totProdKg/totLiveKg*100 : 0;
  const doaRate = totQty>0 ? totDoa/totQty*100 : 0;
  const slRate = totQty>0 ? totSl/totQty*100 : 0;
  // qty-weighted avg bird weight
  let wSum=0,wQty=0; rows.forEach(r=>{if(r.awt&&r.qty){wSum+=r.awt*r.qty;wQty+=r.qty;}});
  const avgAwt = wQty?wSum/wQty:0;
  return {rows, nDays:rows.length, from:rows[0].d, to:rows[rows.length-1].d,
    totQty, totDoa, totSl, totLiveKg, totProdKg, totL1, totL2, totBr,
    avgYield:+avgYield.toFixed(1), doaRate:+doaRate.toFixed(2), slRate:+slRate.toFixed(1), avgAwt:+avgAwt.toFixed(3)};
}

// ============== ABC / PARETO + BRAND PERFORMANCE ENGINE ==============
// metric: 'dS'/'dP'/'dO'. Ranks products by value (boxes), classifies A/B/C by cumulative %,
// and rolls up performance by brand.
function computeABC(metricKey, from, to, F){
  if(!SKU_DATES.length)return null;
  F=F||{};
  const idxs=[]; SKU_DATES.forEach((d,i)=>{ if((!from||d>=from)&&(!to||d<=to)) idxs.push(i); });
  if(!idxs.length)return {rows:[],brands:[],nDays:0};
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat,F.cat));
  sku=sku.filter(p=>msPass(p.fam||'—',F.fam));
  if(F.ff&&F.ff!=='all') sku=sku.filter(p=>detectType(p)===F.ff);
  if(F.own&&F.own!=='all') sku=sku.filter(p=>classifyOwn(p)===F.own);
  if(F.pack&&F.pack!=='all') sku=sku.filter(p=>packType(p.n)===F.pack);
  if(F.wt&&F.wt.length) sku=sku.filter(p=>F.wt.includes(String(p.wt||'')));
  if(F.brand&&F.brand.length) sku=sku.filter(p=>F.brand.includes(String(p.brand||'—')));
  if(F.prod&&F.prod.length) sku=sku.filter(p=>F.prod.includes(String(p.c)));
  // per-product value (boxes + kg) over the range
  const rows=[];
  sku.forEach(p=>{
    const arr=p[metricKey]||[]; const bk=prodBoxKg(p)||0;
    let boxes=0; idxs.forEach(i=>{boxes+=(arr[i]||0);});
    if(boxes>0) rows.push({code:p.c,name:p.n,nameAr:p.nAr||'',cat:p.cat,brand:String(p.brand||'—'),own:classifyOwn(p),
      boxes:Math.round(boxes), kg:Math.round(boxes*bk)});
  });
  rows.sort((a,b)=>b.boxes-a.boxes);
  const totBoxes=rows.reduce((a,r)=>a+r.boxes,0);
  // cumulative % and ABC class (A=top 80%, B=next 15%, C=last 5%)
  let cum=0;
  rows.forEach((r,i)=>{ cum+=r.boxes; r.cumPct=totBoxes?+(cum/totBoxes*100).toFixed(1):0; r.pct=totBoxes?+(r.boxes/totBoxes*100).toFixed(2):0; r.rank=i+1;
    r.abc = r.cumPct<=80?'A':(r.cumPct<=95?'B':'C'); });
  const aCount=rows.filter(r=>r.abc==='A').length, bCount=rows.filter(r=>r.abc==='B').length, cCount=rows.filter(r=>r.abc==='C').length;
  const aBoxes=rows.filter(r=>r.abc==='A').reduce((a,r)=>a+r.boxes,0);
  // brand rollup (boxes + kg + product count + own/pl)
  const bmap={};
  rows.forEach(r=>{ if(!bmap[r.brand])bmap[r.brand]={brand:r.brand,boxes:0,kg:0,n:0,own:r.own}; const e=bmap[r.brand]; e.boxes+=r.boxes;e.kg+=r.kg;e.n++; });
  const brands=Object.values(bmap).sort((a,b)=>b.boxes-a.boxes).map(b=>({...b, pct: totBoxes?+(b.boxes/totBoxes*100).toFixed(1):0}));
  return {rows, brands, totBoxes, nDays:idxs.length, from:SKU_DATES[idxs[0]], to:SKU_DATES[idxs[idxs.length-1]],
    aCount, bCount, cCount, aBoxes, aPctOfProducts: rows.length?+(aCount/rows.length*100).toFixed(0):0,
    aPctOfValue: totBoxes?+(aBoxes/totBoxes*100).toFixed(0):0, nProducts:rows.length};
}

  $id('Ch3T')&&($id('Ch3T').textContent=AR?'توزيع الخطوط والاستلام':'Line loads & receiving');
  mk('opsCh3',{type:'bar',data:{labels:B.map(b=>b.k),datasets:[

  const tbl=$id('Tbl');
  if(tbl)tbl.innerHTML=`<thead><tr>${H.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`+

function renderInvanTable(){

  else if(S.view==='high')rows=rows.filter(r=>r.dos>=60||r.turnover<0.5); // slow-moving / excess stock

    if(r.dos>=60)return `<span class="pill" style="background:#5b8db8;color:#fff">${AR?'فائض':'Excess'}</span>`;
    return `<span class="pill g">${AR?'جيد':'OK'}</span>`;

// ================= WEIGHT TAB ENGINE =================
// Receiving (incoming live + losses counted ONCE) + production weight (filtered) + offals% + yield.
function computeWeightTab(from, to, catF, famF, ownF, ffF){
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  // 1) Receiving per day — losses summed ONCE (5 daily-total components only, no line re-add)
  const rxByDay={};
  if(DATA.rx&&DATA.rx.daily){
    DATA.rx.daily.forEach(e=>{
      if(!e.d||!inR(e.d))return;
      const incW=+e.wt||0; if(incW<=0)return;
      const medW=+e.med_wt||0, wingW=+e.wings_wt||0, misW=+e.mistake_wt||0, stunW=+e.stunner_wt||0, doaW=+e.doa_wt||0;
      const losses=medW+wingW+misW+stunW+doaW;   // counted once
      rxByDay[e.d]={d:e.d, incCount:+e.v||0, incW, medW, wingW, misW, stunW, doaW, losses, netLive:incW-losses};
    });
  }
  // date index range for production columns
  const idxRange=[];
  if(typeof SKU_DATES!=='undefined'&&SKU_DATES.length){SKU_DATES.forEach((d,i)=>{if(inR(d))idxRange.push({i,d});});}
  const boxKgOf=p=>prodBoxKg(p)||0;
  const prodBoxesUnits=p=>{ // returns {boxes, kg} over idxRange
    let bx=0; idxRange.forEach(o=>{bx+=(p.dP&&p.dP[o.i]!=null?p.dP[o.i]:0);}); return {boxes:bx, kg:bx*boxKgOf(p)};
  };
  // 2) product filter (cat/fam/own/ff)
  const passOwn=p=>ownF==='all'||classifyOwn(p)===ownF;
  const passFf=p=>ffF==='all'||String(p.typ||'').toLowerCase()===ffF;
  const passExcl=p=>!(WD_EXCLUDE||[]).includes(p.cat);
  let sku=(DATA.sku||[]).filter(p=>msPass(p.cat,catF)&&msPass(p.sub||'—',famF)&&passOwn(p)&&passFf(p)&&passExcl(p));

  // 3) per-day production weight of the FILTERED products (for yield trend)
  const prodByDay={};
  idxRange.forEach(o=>{prodByDay[o.d]=0;});
  sku.forEach(p=>{ if(!p.dP)return; idxRange.forEach(o=>{ const bx=p.dP[o.i]||0; if(bx>0) prodByDay[o.d]+=bx*boxKgOf(p); }); });

  // 4) OFFALS actual weight (liver+heart+gizzard) over the period — NOT affected by cat filter (always offals cat)
  let offalKg=0;
  (DATA.sku||[]).forEach(p=>{ if(String(p.cat).trim()==='Offals'){ offalKg+=prodBoxesUnits(p).kg; } });

  // 5) build product rows (filtered) + category rollup
  const prows=[]; let prodTotKg=0, prodTotBoxes=0, prodTotUnits=0;
  sku.forEach(p=>{const r=prodBoxesUnits(p); if(r.kg>0||r.boxes>0){
    const units=Math.round(r.boxes*(p.pcs||0));
    prows.push({code:p.c,name:p.n,cat:p.cat,fam:p.sub||'—',typ:p.typ||'—',own:classifyOwn(p),
      boxes:Math.round(r.boxes), units, boxKg:+boxKgOf(p).toFixed(2), kg:Math.round(r.kg)});
    prodTotKg+=r.kg; prodTotBoxes+=r.boxes; prodTotUnits+=units;
  }});
  prows.sort((a,b)=>b.kg-a.kg);
  const catAgg={};
  prows.forEach(r=>{if(!catAgg[r.cat])catAgg[r.cat]={cat:r.cat,kg:0,boxes:0,n:0};catAgg[r.cat].kg+=r.kg;catAgg[r.cat].boxes+=r.boxes;catAgg[r.cat].n++;});

  // 6) receiving totals + daily yield rows (only days with receiving AND production)
  const rxDates=Object.keys(rxByDay).sort();
  const yrows=[];
  rxDates.forEach(d=>{
    const R=rxByDay[d]; const pKg=prodByDay[d]||0;
    yrows.push({d, incW:R.incW, losses:R.losses, netLive:R.netLive, prodKg:pKg,
      yieldLive: R.incW>0?pKg/R.incW:0, yieldNet: R.netLive>0?pKg/R.netLive:0});
  });
  const sumR=k=>Object.values(rxByDay).reduce((a,r)=>a+(+r[k]||0),0);
  const totIncW=sumR('incW'), totLosses=sumR('losses'), totNet=sumR('netLive'), totIncCount=sumR('incCount');

  const catList=Object.values(catAgg).sort((a,b)=>b.kg-a.kg).map(c=>({...c, pctOfProd: prodTotKg?c.kg/prodTotKg:0}));

  return {
    // receiving
    totIncW, totLosses, totNet, totIncCount,
    medW:sumR('medW'), wingW:sumR('wingW'), misW:sumR('misW'), stunW:sumR('stunW'), doaW:sumR('doaW'),
    // production (filtered)
    prodTotKg:Math.round(prodTotKg), prodTotBoxes:Math.round(prodTotBoxes), prodTotUnits:Math.round(prodTotUnits),
    prows, catList,
    // offals
    offalKg:Math.round(offalKg), offalPctLive: totIncW?offalKg/totIncW:null,
    // yield (production ÷ live)
    yieldLive: totIncW?prodTotKg/totIncW:null,
    yieldNet: totNet?prodTotKg/totNet:null,
    yrows, nDays: yrows.length,
    hasRx: rxDates.length>0
  };
}

function skuWindowIdx(){
  // returns [startIdx,endIdx] inclusive into DATA.pdates based on SKURANGE
  const pd=DATA.pdates; if(!pd||!pd.length)return null;
  const last=pd.length-1; const asof=pd[last];
  function findFrom(dstr){let i=0;while(i<pd.length&&pd[i]<dstr)i++;return i}
  if(SKURANGE.mode==='all')return[0,last];
  if(SKURANGE.mode==='30'){return[Math.max(0,last-29),last]}
  if(SKURANGE.mode==='7'){return[Math.max(0,last-6),last]}
  if(SKURANGE.mode==='mtd'){const m=asof.slice(0,7);let i=last;while(i>0&&pd[i-1].slice(0,7)===m)i--;return[i,last]}
  if(SKURANGE.mode==='wk'){const d=new Date(asof+'T00:00:00Z');const wd=(d.getUTCDay()+1)%7;
    const sat=new Date(d);sat.setUTCDate(sat.getUTCDate()-wd);const sStr=sat.toISOString().slice(0,10);
    return[findFrom(sStr),last]}
  if(SKURANGE.mode==='custom'){const a=SKURANGE.from?findFrom(SKURANGE.from):0;
    let b=last;if(SKURANGE.to){b=0;while(b<pd.length&&pd[b]<=SKURANGE.to)b++;b=Math.min(last,b-1<a?a:b-1);}
    return[a,b]}
  return[0,last];
}
function skuWindowAgg(code,si,ei){
  const arr=DATA.pdaily&&DATA.pdaily[String(code)];
  if(!arr)return null;
  const [o,p,s]=arr; let to=0,tp=0,ts=0,smx=0,smxi=-1,omx=0,pmx=0,smn=null,smni=-1,lastj=-1;
  for(let j=si;j<=ei&&j<o.length;j++){
    to+=o[j]; tp+=p[j]; ts+=s[j];
    if(s[j]>smx){smx=s[j];smxi=j} if(s[j]>0&&(smn===null||s[j]<smn)){smn=s[j];smni=j} if(s[j]>0)lastj=j;
    if(o[j]>omx)omx=o[j]; if(p[j]>pmx)pmx=p[j];
  }
  return {ord:to,prod:tp,sales:ts,smx,smxd:smxi>=0&&smx>0?DATA.pdates[smxi]:null,
    smn:smn,smnd:smni>=0?DATA.pdates[smni]:null,omx,pmx,
    ful:to>0?ts/to:null,last:lastj>=0?DATA.pdates[lastj]:null};
}

let __perDelegated=false;
function initPeriodDelegation(){
  if(__perDelegated)return; __perDelegated=true;
  document.addEventListener('click',function(ev){
    const b=ev.target.closest && ev.target.closest('.perBtn');
    if(!b)return;
    ev.preventDefault();
    const k=b.dataset.k, v=+b.dataset.v;
    if(k==null)return;
    PERIOD[k]=v;
    if(k==='ma')renderTrend();
    else if(k==='rx'||k==='rxw')renderRx();
    else if(k==='wk'||k==='wkt'||k==='mot')renderWeekMonth();

    const cats=[...new Set(allP.map(p=>p.cat))].filter(Boolean).sort();
    msDropdown('cmpCat', cats.map(c=>[c,(t().cats&&t().cats[c])||c]), CMP_F.cat, sel=>{CMP_F.cat=sel;CMP_F.fam=[];renderCmp();}, AR?'كل الفئات':'All categories');
    const fams=[...new Set(allP.filter(p=>msPass(p.cat,CMP_F.cat)).map(p=>p.fam||'—'))].filter(x=>x&&x!=='—').sort();
    CMP_F.fam=CMP_F.fam.filter(v=>fams.includes(v));
    msDropdown('cmpFam', fams.map(f=>[f,f]), CMP_F.fam, sel=>{CMP_F.fam=sel;renderCmp();}, AR?'كل العائلات':'All families');
    const wts=[...new Set(allP.map(p=>p.wt).filter(w=>w))].sort((a,b)=>a-b);
    msDropdown('cmpWt', wts.map(w=>[String(w),F(w)+(AR?' غم':' g')]), CMP_F.wt, sel=>{CMP_F.wt=sel;renderCmp();}, AR?'كل الأوزان':'All weights');
    const brands=[...new Set(allP.map(p=>String(p.brand||'—')))].filter(x=>x&&x!=='—').sort();
    CMP_F.brand=CMP_F.brand.filter(v=>brands.includes(v));
    msDropdown('cmpBrand', brands.map(b=>[b,b]), CMP_F.brand, sel=>{CMP_F.brand=sel;renderCmp();}, AR?'كل البراندات':'All brands');
    const prodScope=allP.filter(p=>msPass(p.cat,CMP_F.cat)&&(!(CMP_F.brand&&CMP_F.brand.length)||CMP_F.brand.includes(String(p.brand||'—'))));
    const prods=prodScope.map(p=>[String(p.c),(p.c)+' — '+String(prodName(p)).slice(0,45)]).sort((a,b)=>a[1].localeCompare(b[1]));
    CMP_F.prod=(CMP_F.prod||[]).filter(v=>prods.some(x=>x[0]===String(v)));
    msDropdown('cmpProd', prods, CMP_F.prod, sel=>{CMP_F.prod=sel;renderCmp();}, AR?'كل المنتجات':'All products', true);
    const os=$('#cmpOwn');
    if(os&&!os.dataset.init){os.dataset.init='1';os.onchange=e=>{CMP_F.own=e.target.value;renderCmp();};}
    if(os)os.innerHTML=[['all',AR?'الكل':'All'],['own',AR?'علامتنا':'Own brand'],['pl',AR?'علامة خاصة':'Private Label']].map(([v,l])=>`<option value="${v}" ${v===CMP_F.own?'selected':''}>${l}</option>`).join('');
    const ff=$('#cmpFF');
    if(ff&&!ff.dataset.init){ff.dataset.init='1';ff.onchange=e=>{CMP_F.ff=e.target.value;renderCmp();};}
    if(ff)ff.innerHTML=[['all',AR?'الكل':'All'],['Fresh',AR?'فريش':'Fresh'],['Frozen',AR?'مجمد':'Frozen']].map(([v,l])=>`<option value="${v}" ${v===CMP_F.ff?'selected':''}>${l}</option>`).join('');
    const packs=[...new Set(allP.map(p=>packType(p.n)))].filter(Boolean).sort();
    const ps=$('#cmpPack');
    if(ps&&!ps.dataset.init){ps.dataset.init='1';ps.onchange=e=>{CMP_F.pack=e.target.value;renderCmp();};}
    if(ps)ps.innerHTML=[['all',AR?'الكل':'All']].concat(packs.map(p=>[p,p])).map(([v,l])=>`<option value="${v}" ${v===CMP_F.pack?'selected':''}>${l}</option>`).join('');
  })();
  // if any product-attribute filter is active, recompute series from filtered sku data
  const cmpFltActive = CMP_F.cat.length||CMP_F.fam.length||CMP_F.ff!=='all'||CMP_F.own!=='all'||CMP_F.pack!=='all'||CMP_F.wt.length||CMP_F.brand.length||CMP_F.prod.length;
  if(cmpFltActive){
    const CF=computeCmpFiltered(null,null,CMP_F);
    if(CF){ series = isW?CF.weekly:CF.daily; }
  }
  // date range filter (uses the daily 'd' or weekly 'frm' key)
  $('#cmpFromL')&&($('#cmpFromL').textContent=T.cmpFromL); $('#cmpToL')&&($('#cmpToL').textContent=T.cmpToL);
  const ccb=$('#cmpClearBtn'); if(ccb)ccb.textContent=T.cmpClearD;
  const cfr=$('#cmpFrom'), cto=$('#cmpTo');
  if(C.daily_cmp&&C.daily_cmp.length){const lo=C.daily_cmp[0].d,hi=C.daily_cmp[C.daily_cmp.length-1].d;[cfr,cto].forEach(el=>{if(el){el.min=lo;el.max=hi;}});}
  if(cfr&&!cfr.dataset.init){cfr.dataset.init='1';cfr.onchange=e=>{CMPFROM=e.target.value||null;renderCmp();};cfr.onclick=()=>{if(cfr.showPicker){try{cfr.showPicker();}catch(e){}}};}
  if(cto&&!cto.dataset.init){cto.dataset.init='1';cto.onchange=e=>{CMPTO=e.target.value||null;renderCmp();};cto.onclick=()=>{if(cto.showPicker){try{cto.showPicker();}catch(e){}}};}
  if(cfr)cfr.value=CMPFROM||''; if(cto)cto.value=CMPTO||'';
  if(ccb&&!ccb.dataset.init){ccb.dataset.init='1';ccb.onclick=()=>{CMPFROM=null;CMPTO=null;renderCmp();};}
  const dateActive=!!(CMPFROM||CMPTO);
  if(dateActive){const dk=isW?'frm':'d';series=series.filter(e=>{const d=e[dk]||e.d;return (!CMPFROM||d>=CMPFROM)&&(!CMPTO||d<=CMPTO);});}
  const win=isW?PERIOD.cmpw:PERIOD.cmp;
  $('#cmpFilter').innerHTML=isW?periodBar('cmpFilter','cmpw',[12,26,52,0]):periodBar('cmpFilter','cmp',[30,60,90,180,0]);
  // when a date range is active, ignore the tail window (show the full range)
  const view=dateActive?series:tail(series,win);
  const lbl=view.map(e=>isW?e.label:e.d.slice(5));
  // KPI totals over the viewed window
  // KPI cards: boxes (main) + weight (sub) + coverage/gap — all respect CMP filters & date range
  const KT=cmpKpiTotals(CMP_F, CMPFROM, CMPTO);
  const TO=KT.oB,TP=KT.pB,TS=KT.sB;
  const AR=LANG==='ar', kgU=AR?'كغم':'kg', boxU=AR?'صندوق':'boxes';
  const prodGap=TP-TO;            // production − orders (supply gap)
  const salesGap=TO-TS;           // orders − sales (unmet demand / sales gap)
  const covP=TO>0?TP/TO:null, covS=TO>0?TS/TO:null;
  const cardBW=(k,box,kg,d,dcolor)=>`<div class="card"><div class="k">${k}</div>`+
    `<div class="v num">${F(box)} <span style="font-size:12px;opacity:.6">${boxU}</span></div>`+
    `<div class="d" style="opacity:.8">${F(kg)} ${kgU}</div>`+
    (d?`<div class="d"${dcolor?` style="color:${dcolor};font-weight:700"`:''}>${d}</div>`:'')+`</div>`;
  const pcC=v=>v==null?'—':(v>=0.95?'var(--green)':v>=0.7?'var(--gold2)':'var(--red)');
  $('#cmpKpi').innerHTML=[
   cardBW(T.cmpKO,TO,KT.oK,'',null),
   cardBW(T.cmpKP,TP,KT.pK,(covP==null?'—':Pc(covP)+' '+(AR?'تغطية إنتاج':'prod coverage')),pcC(covP)),
   cardBW(T.cmpKS,TS,KT.sK,(covS==null?'—':Pc(covS)+' '+(AR?'تغطية مبيعات':'sales coverage')),pcC(covS)),
   cardBW((AR?'فجوة الإنتاج (إنتاج−طلب)':'Production gap (prod−orders)'),prodGap,KT.pK-KT.oK,(prodGap>=0?'▲ '+(AR?'فائض':'surplus'):'▼ '+(AR?'عجز':'deficit')),prodGap>=0?'var(--green)':'var(--red)'),
   cardBW((AR?'فجوة المبيعات (طلب−مبيعات)':'Sales gap (orders−sales)'),salesGap,KT.oK-KT.sK,(salesGap<=0?'▲ '+(AR?'مغطّى':'covered'):'▼ '+(AR?'طلب غير مُلبّى':'unmet demand')),salesGap<=0?'var(--green)':'var(--red)')
  ].join('');
  // trend chart
  const dl={display:true,color:css('--ink'),font:{size:9,weight:'700'},formatter:v=>v?Fk(v):''};
  mk('cCmpTrend',{type:isW?'bar':'line',data:{labels:lbl,datasets:[
   {label:T.thOrd,data:view.map(e=>e.o),borderColor:SKY,backgroundColor:SKY,tension:.3,pointRadius:0,borderWidth:2},
   {label:T.thProd,data:view.map(e=>e.p),borderColor:GREEN,backgroundColor:GREEN,tension:.3,pointRadius:0,borderWidth:2},
   {label:T.thSale,data:view.map(e=>e.s),borderColor:GOLD,backgroundColor:GOLD,tension:.3,pointRadius:0,borderWidth:2}]},
   options:{maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12}}},scales:{x:{ticks:{font:{size:9},maxRotation:90,maxTicksLimit:isW?26:20}}}}});
  // coverage ratio chart
  const cov=view.map(e=>e.o?+(e.p/e.o*100).toFixed(1):null);
  const covs=view.map(e=>e.o?+(e.s/e.o*100).toFixed(1):null);
  mk('cCmpCov',{type:'line',data:{labels:lbl,datasets:[
   {label:T.covPgt+'÷'+T.thOrd,data:cov,borderColor:GREEN,backgroundColor:GREEN,tension:.3,pointRadius:0,borderWidth:2},
   {label:T.covSgt+'÷'+T.thOrd,data:covs,borderColor:GOLD,backgroundColor:GOLD,tension:.3,pointRadius:0,borderWidth:2},
   {label:'100%',data:view.map(()=>100),borderColor:RED,borderDash:[5,4],pointRadius:0,borderWidth:1.5}]},
   options:{maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12}}},scales:{y:{ticks:{callback:v=>v+'%'}},x:{ticks:{font:{size:9},maxRotation:90,maxTicksLimit:isW?26:14}}}}});
  // gap bar
  mk('cCmpGap',{type:'bar',data:{labels:lbl,datasets:[
   {data:view.map(e=>e.p-e.o),backgroundColor:view.map(e=>e.p>=e.o?GREEN:RED)}]},
   options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:90,maxTicksLimit:isW?26:14}}}}});
  // uncovered analysis — bound to the tab's own filters AND date range (CMPFROM/CMPTO)
  const mSel=$('#cmpUncMetric'); if(mSel){mSel.style.display='none';}  // per-row metric dropdown removed; table now respects tab filters + dates
  // products passing the MAIN tab filters (CMP_F)
  const _passSku=(DATA.sku||[]).filter(p=>
      msPass(p.cat,CMP_F.cat) && msPass(p.fam||'—',CMP_F.fam)
      && (CMP_F.ff==='all'||detectType(p)===CMP_F.ff)
      && (CMP_F.own==='all'||classifyOwn(p)===CMP_F.own)
      && (CMP_F.pack==='all'||packType(p.n)===CMP_F.pack)
      && (!CMP_F.wt.length||CMP_F.wt.includes(String(p.wt||'')))
      && (!CMP_F.brand.length||CMP_F.brand.includes(String(p.brand||'—')))
      && (!CMP_F.prod.length||CMP_F.prod.includes(String(p.c))));
  // compute per-product coverage LIVE over the selected date range (CMPFROM..CMPTO), working days only
  const _uIdx=[]; SKU_DATES.forEach((d,i)=>{ if((!CMPFROM||d>=CMPFROM)&&(!CMPTO||d<=CMPTO)) _uIdx.push(i); });
  let rows=_passSku.map(p=>{
    let to=0,tp=0,ts=0; _uIdx.forEach(i=>{to+=(p.dO&&p.dO[i])||0;tp+=(p.dP&&p.dP[i])||0;ts+=(p.dS&&p.dS[i])||0;});
    if(to<=0)return null;
    const oc=prodOpenClose(p,CMPFROM,CMPTO);
    const fulfilled=Math.max(tp,ts); const sq=Math.max(0,to-fulfilled);
    return {c:p.c,n:p.n,nAr:p.nAr,cat:p.cat,ord:Math.round(to),prod:Math.round(tp),sales:Math.round(ts),
      covP:to>0?tp/to:null,covS:to>0?ts/to:null,shortQty:Math.round(sq),open:oc.open,close:oc.close};
  }).filter(Boolean);
  // default sort: biggest shortfall first (most urgent uncovered orders)
  rows.sort((a,b)=>(b.shortQty||0)-(a.shortQty||0));
  const _ocD=(CMPFROM||SKU_DATES[0])+' → '+(CMPTO||SKU_DATES[SKU_DATES.length-1]);
  $('#tCmpUnc').innerHTML=`<tr><th>#</th><th>${T.skuTh[1]}</th><th style="text-align:start">${T.skuTh[2]}</th><th>${T.thCat}</th><th>${LANG==='ar'?'رصيد افتتاح':'Opening'}</th><th>${T.thOrd}</th><th>${T.thProd}</th><th>${T.thSale}</th><th>${T.thCovP}</th><th>${T.thCovS}</th><th>${LANG==='ar'?'النقص':'Short'}</th><th>${LANG==='ar'?'رصيد إقفال':'Closing'}</th></tr>`+
   rows.slice(0,60).map((p,i)=>`<tr><td>${i+1}</td><td>${p.c}</td><td style="text-align:start">${prodName(p)}</td><td>${T.cats[p.cat]||p.cat}</td>
   <td class="num">${F(p.open)}</td>
   <td class="num">${F(p.ord)}</td><td class="num">${F(p.prod)}</td><td class="num">${F(p.sales)}</td>
   <td>${p.covP==null?'—':`<span class="pill ${p.covP>=0.95?'g':(p.covP>=0.7?'y':'r')}">${Pc(p.covP,0)}</span>`}</td>
   <td>${p.covS==null?'—':`<span class="pill ${p.covS>=0.95?'g':(p.covS>=0.7?'y':'r')}">${Pc(p.covS,0)}</span>`}</td>
   <td class="num">${F(p.shortQty)}</td><td class="num">${F(p.close)}</td></tr>`).join('');
  // wire granularity buttons (delegation covers perBtn; gran handled here)
  document.querySelectorAll('.granBtn').forEach(b=>b.onclick=()=>{CMPGRAN=b.dataset.g;renderCmp();});
  wirePeriod();
}


function recomputeFri(){
  if(RAWMATS){
    try{ DATA=computeFromMats({S:RAWMATS.S,O:RAWMATS.O,P:RAWMATS.P,K:RAWMATS.K,C:RAWMATS.C},RAWMATS.RX);
      try{localStorage.setItem('sk_dash_v5',JSON.stringify(DATA))}catch(e){}
      renderAll(); return;
    }catch(e){console.error('recompute failed',e);}
  }
  // no raw matrices yet: pull fresh from Sheets (recomputes honoring EXCL_FRI); fallback to current render
  if(typeof loadFromSheets==='function'){ loadFromSheets(); }
  else renderAll();
}


function renderPlant(){
  const T=t(), P=DATA.proc;
  $('#plTitle').textContent=T.plTitle; $('#plSub').textContent=T.plSub;
  $('#plProdT').textContent=T.plProdT; $('#plYieldT').textContent=T.plYieldT;
  $('#plNote').textContent=T.plNote;
  if(!P||!P.daily||!P.daily.length){
    $('#plKpi').innerHTML='<div class="card" style="grid-column:1/-1"><div class="k">'+(LANG==='ar'?'لا توجد بيانات معالجة بعد':'No processing data yet')+'</div><div class="d">'+(LANG==='ar'?'تأكد أن شيت المعالجة مُشارَك (Anyone with link / Viewer) وأن تبويباته Daily_Grades و Daily_Histogram، ثم اضغط تحديث الآن.':'Ensure the processing sheet is shared (Anyone with link / Viewer) with tabs Daily_Grades & Daily_Histogram, then press Refresh.')+'</div></div>';
    ['cPlProd','cPlUtil','cPlYield'].forEach(id=>{const c=charts[id];if(c){c.destroy();delete charts[id];}});
    $('#tPlant').innerHTML='';$('#plGran').innerHTML='';return;}
  // controls: granularity + date range
  const allD=P.days.slice(); const dMin=allD[0], dMax=allD[allD.length-1];
  $('#plGran').innerHTML=`<span class="perlbl">${T.perShow}</span>`+
    `<button class="granBtn ${PLGRAN==='daily'?'on':''}" data-pg="daily">${T.plGranD}</button>`+
    `<button class="granBtn ${PLGRAN==='weekly'?'on':''}" data-pg="weekly">${T.plGranW}</button>`+
    `<span class="perlbl" style="margin-inline-start:14px">${T.rngLbl}</span>`+
    `<span class="perlbl">${T.rngFrom}</span><input type="date" id="plFrom" class="rngDate" min="${dMin}" max="${dMax}" value="${PLFROM}">`+
    `<span class="perlbl">${T.rngTo}</span><input type="date" id="plTo" class="rngDate" min="${dMin}" max="${dMax}" value="${PLTO}">`+
    `<button class="rngBtn ${(!PLFROM&&!PLTO)?'on':''}" id="plRngReset">${T.rngReset}</button>`;
  const isW=PLGRAN==='weekly';
  // aggregate by day, then apply date-range window
  const dmap={};
  P.daily.forEach(e=>{dmap[e.d]=dmap[e.d]||{d:e.d,count:0,kg:0,ab:0,lines:{}};
    dmap[e.d].count+=e.count;dmap[e.d].kg+=e.kg;dmap[e.d].ab+=e.ab;dmap[e.d].lines[e.line]=e;});
  let days=Object.values(dmap).sort((a,b)=>a.d.localeCompare(b.d));
  // apply from/to window (inclusive)
  if(PLFROM)days=days.filter(d=>d.d>=PLFROM);
  if(PLTO)days=days.filter(d=>d.d<=PLTO);
  const winDays=new Set(days.map(d=>d.d));
  // line list = PDS lines (1 & 2) + Breeder (from receiving intake, manual count)
  const BREEDER='Breeder Line';
  const lineNames=P.lineNames.slice();
  // window totals (sum across selected days)
  const winAgg={count:0,kg:0,ab:0,lines:{}};
  days.forEach(dd=>{winAgg.count+=dd.count;winAgg.kg+=dd.kg;winAgg.ab+=dd.ab;
    P.lineNames.forEach(ln=>{const e=dd.lines[ln];if(e){winAgg.lines[ln]=winAgg.lines[ln]||{count:0,kg:0,ab:0};
      winAgg.lines[ln].count+=e.count;winAgg.lines[ln].kg+=e.kg;winAgg.lines[ln].ab+=e.ab;}});});
  // Breeder Line: take birds from receiving (rx) breeder column for the same window days
  let brCount=0, brHasData=false;
  if(DATA.rx&&DATA.rx.daily){DATA.rx.daily.forEach(x=>{ if(winDays.has(x.d) && x.br!=null && x.br>0){brCount+=x.br;brHasData=true;} });}
  if(brHasData){
    if(!lineNames.includes(BREEDER))lineNames.push(BREEDER);
    // breeder has no kg/grade data (manual count) — only birds & utilisation
    winAgg.lines[BREEDER]={count:brCount,kg:0,ab:0,breeder:true};
    winAgg.count+=brCount; // include breeder birds in plant total
  }
  // intake over the same window (from DATA.rx)
  let intakeWin=0,intakeHas=false;
  if(DATA.rx&&DATA.rx.daily){DATA.rx.daily.forEach(x=>{if(winDays.has(x.d)){intakeWin+=x.v;intakeHas=true;}});}
  const yld=intakeHas&&intakeWin>0?winAgg.count/intakeWin:null;
  const rangeLabel=days.length?(days[0].d+' → '+days[days.length-1].d):'';
  // KPI cards (window aggregate)
  $('#plKpi').innerHTML=[
   [T.plKbirds,F(winAgg.count),rangeLabel],
   [T.plKkg,F(winAgg.kg),''],
   [T.plKavg,F(winAgg.count?Math.round(winAgg.kg/winAgg.count*1000):0)+' g',''],
   [T.plKyield,yld?Pc(yld):'—',intakeHas?(T.plThBirds+' '+F(winAgg.count)+' ÷ '+T.rxRec+' '+F(intakeWin)):T.plYieldNote],
   [T.plKab,Pc(winAgg.count?winAgg.ab/winAgg.count:0),F(winAgg.ab)]
  ].map(([k,v,dd])=>`<div class="card"><div class="k">${k}</div><div class="v num">${v}</div><div class="d">${dd}</div></div>`).join('');
  // production per line chart (daily within window, or weekly)
  const dl={display:true,color:css('--ink'),font:{size:9,weight:'700'},formatter:v=>v?Fk(v):''};
  const colors=[GOLD,SKY,GREEN,VIO];
  let lbl, prodData;
  if(isW){
    const wl={}, word=[];
    P.daily.forEach(e=>{ if(!winDays.has(e.d))return;
      const sat=satOf(new Date(e.d+'T00:00:00Z'));const k=iso(sat);
      if(!wl[k]){wl[k]={label:wlabel(sat),frm:k,lines:{}};word.push(k);}
      wl[k].lines[e.line]=(wl[k].lines[e.line]||0)+e.count;});
    // add breeder weekly from rx intake
    if(DATA.rx&&DATA.rx.daily){DATA.rx.daily.forEach(x=>{if(!winDays.has(x.d)||!(x.br>0))return;
      const sat=satOf(new Date(x.d+'T00:00:00Z'));const k=iso(sat);
      if(!wl[k]){wl[k]={label:wlabel(sat),frm:k,lines:{}};word.push(k);}
      wl[k].lines[BREEDER]=(wl[k].lines[BREEDER]||0)+x.br;});}
    word.sort();
    lbl=word.map(k=>wl[k].label);
    prodData=lineNames.map((ln,i)=>({label:ln,backgroundColor:colors[i%colors.length],datalabels:dl,
      data:word.map(k=>wl[k].lines[ln]||0)}));
  } else {
    lbl=days.map(e=>e.d.slice(5));
    const rxBr=d=>{const x=DATA.rx&&DATA.rx.daily&&DATA.rx.daily.find(y=>y.d===d);return x&&x.br>0?x.br:0;};
    prodData=lineNames.map((ln,i)=>({label:ln,backgroundColor:colors[i%colors.length],datalabels:dl,
      data:days.map(e=> ln===BREEDER ? rxBr(e.d) : (e.lines[ln]?e.lines[ln].count:0) )}));
  }
  // stacked line-load chart (quantity per line) + received overlay — matches the ops-style visual
  prodData.forEach(ds=>{ds.stack='lines';});
  // add a "received" overlay line from rx intake (total birds received per bucket)
  let recvData=null;
  if(DATA.rx&&DATA.rx.daily){
    if(isW){const wmap={}; DATA.rx.daily.forEach(x=>{if(!winDays.has(x.d))return;const sat=satOf(new Date(x.d+'T00:00:00Z'));const k=iso(sat);wmap[k]=(wmap[k]||0)+(x.v||0);});
      recvData=Object.keys(wmap).sort().map(k=>wmap[k]);}
    else {recvData=days.map(e=>{const x=DATA.rx.daily.find(y=>y.d===e.d);return x&&x.v?x.v:0;});}
  }
  const cplDatasets=prodData.slice();
  if(recvData&&recvData.some(v=>v>0))cplDatasets.push({type:'line',label:(LANG==='ar'?'المستلم':'Received'),data:recvData,borderColor:GREEN,backgroundColor:'transparent',pointRadius:0,tension:.3,datalabels:{display:false}});
  mk('cPlProd',{type:'bar',data:{labels:lbl,datasets:cplDatasets},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:9}}},
      tooltip:{callbacks:{label:c=>c.dataset.label+': '+F(c.parsed.y)}}},
      scales:{y:{stacked:true,beginAtZero:true,grid:{color:css('--line')},ticks:{callback:v=>Fk(v)}},x:{stacked:true,ticks:{font:{size:9},maxRotation:90},grid:{display:false}}}}});
  // yield trend within window (processed vs intake per day)
  const yldDays=days.filter(e=>DATA.rx&&DATA.rx.daily&&DATA.rx.daily.find(x=>x.d===e.d));
  mk('cPlYield',{type:'line',data:{labels:yldDays.map(e=>e.d.slice(5)),datasets:[{
    label:T.plKyield,data:yldDays.map(e=>{const m=DATA.rx.daily.find(x=>x.d===e.d);return m&&m.v?+(e.count/m.v*100).toFixed(1):null;}),
    borderColor:GOLD,backgroundColor:GOLD,tension:.3,pointRadius:2,
    datalabels:{display:true,color:css('--ink'),font:{size:9,weight:'700'},formatter:v=>v?v+'%':''}}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'%'}}}}});
  // Work hours per line over the window. RULE: Line 1 & Line 2 run SIMULTANEOUSLY —
  // they share the same daily hours; if both have entries that differ, use their average;
  // if only one has an entry, the other inherits it. Breeder Line is independent.
  const LINEPAIR=['Line 1 (B01)','Line 2 (B03)'];
  const dayLineHours=(dk,ln)=>{const H=P.hours&&P.hours[dk];
    if(LINEPAIR.includes(ln)){
      const h1=H&&H[LINEPAIR[0]], h2=H&&H[LINEPAIR[1]];
      if(h1&&h2)return {h:(h1+h2)/2,has:true};       // both present -> average
      if(h1)return {h:h1,has:true};                   // inherit the one present
      if(h2)return {h:h2,has:true};
      return {h:LINE_STD_HOURS[ln]||20,has:false};     // standard
    } else { const hh=H&&H[ln]; return hh?{h:hh,has:true}:{h:LINE_STD_HOURS[ln]||16,has:false}; }
  };
  const hoursWin={};
  lineNames.forEach(ln=>{let sum=0,n=0,hasH=false;
    const isBr=(ln===BREEDER);
    days.forEach(dd=>{
      if(isBr){ // breeder ran on days where rx breeder intake exists
        const rx=DATA.rx&&DATA.rx.daily&&DATA.rx.daily.find(x=>x.d===dd.d);
        if(!rx||!(rx.br>0))return;
      } else { if(!dd.lines[ln])return; } // PDS line ran that day
      const r=dayLineHours(dd.d,ln);sum+=r.h;n++;if(r.has)hasH=true;});
    const avg=n>0?sum/n:0;
    hoursWin[ln]={sum,avg,n,hasH};});
  // utilisation per line = birds / (capacity/hr * total work hours in window)
  const utilOf=ln=>{const e=winAgg.lines[ln];if(!e)return null;const cap=LINE_CAP[ln]||30000;
    const h=hoursWin[ln].sum; return h>0?e.count/(cap*h):null;};
  // utilisation chart (per line)
  const utilLines=lineNames.filter(ln=>winAgg.lines[ln]&&winAgg.lines[ln].count);
  mk('cPlUtil',{type:'bar',data:{labels:utilLines.map(ln=>ln),datasets:[{
    data:utilLines.map(ln=>{const u=utilOf(ln);return u==null?0:+(u*100).toFixed(1);}),
    backgroundColor:utilLines.map(ln=>{const u=utilOf(ln)||0;return u>=0.9?RED:u>=0.6?GOLD:GREEN;}),
    datalabels:{display:true,color:css('--ink'),font:{size:11,weight:'700'},anchor:'end',align:'start',formatter:v=>v+'%'}}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'%'}}}}});
  const utilPanelEl=document.getElementById('cPlUtil'); if(utilPanelEl&&utilPanelEl.closest('.panel'))utilPanelEl.closest('.panel').style.display='';
  $('#plUtilT').textContent=T.plUtilT;
  // table with utilisation + hours
  $('#tPlant').innerHTML=`<tr><th>${T.plThLine}</th><th>${T.plThBirds}</th><th>${T.plThKg}</th><th>${T.plThAvg}</th><th>${T.plThShare}</th><th>${T.plThHours}</th><th>${T.plThUtil}</th><th>A+B%</th></tr>`+
    lineNames.map(ln=>{const e=winAgg.lines[ln];if(!e||!e.count)return '';
      const isBr=e.breeder; const avg=(!isBr&&e.count)?Math.round(e.kg/e.count*1000):0; const u=utilOf(ln); const hw=hoursWin[ln];
      return `<tr><td><b>${ln}</b>${isBr?` <span style="font-size:10px;opacity:.6">(${LANG==='ar'?'عدّ يدوي':'manual'})</span>`:''}</td>
      <td class="num">${F(e.count)}</td><td class="num">${isBr?'—':F(e.kg)}</td>
      <td class="num">${isBr?'—':F(avg)+' g'}</td><td>${Pc(winAgg.count?e.count/winAgg.count:0)}</td>
      <td class="num">${hw?(hw.n>1?(Math.round(hw.avg*10)/10):F(hw.avg))+(hw.hasH?'':'*')+(hw.n>1?(LANG==='ar'?' (متوسط)':' (avg)'):''):'—'}</td>
      <td>${u==null?'—':`<span class="pill ${u>=0.9?'r':u>=0.6?'y':'g'}">${Pc(u,0)}</span>`}</td>
      <td>${isBr?'—':Pc(e.count?e.ab/e.count:0)}</td></tr>`;}).join('')+
    `<tr style="background:var(--panel2);font-weight:800"><td>${LANG==='ar'?'الإجمالي':'Total'}</td><td class="num">${F(winAgg.count)}</td><td class="num">${F(winAgg.kg)}</td><td class="num">${F(winAgg.count?Math.round(winAgg.kg/winAgg.count*1000):0)} g</td><td>100%</td><td>—</td><td>—</td><td>${Pc(winAgg.count?winAgg.ab/winAgg.count:0)}</td></tr>`;
  $('#plNote').textContent=T.plNote2;
  document.querySelectorAll('.granBtn[data-pg]').forEach(b=>b.onclick=()=>{PLGRAN=b.dataset.pg;renderPlant();});
  const pf=$('#plFrom'),pt=$('#plTo'),pr=$('#plRngReset');
  const openCal=el=>{ if(el&&el.showPicker){ try{el.showPicker();}catch(e){} } };
  if(pf){pf.onchange=()=>{PLFROM=pf.value||'';renderPlant();}; pf.onclick=()=>openCal(pf);}
  if(pt){pt.onchange=()=>{PLTO=pt.value||'';renderPlant();}; pt.onclick=()=>openCal(pt);}
  if(pr)pr.onclick=()=>{PLFROM='';PLTO='';renderPlant();};
}

      return `<tr><td><b>${bandLabel(s)}</b></td><td class="num">${F(n)}</td><td>${Pc(pct,1)}</td><td class="num">${Pc(cum,1)}</td></tr>`;}).join('')+
    `<tr style="background:var(--panel2);font-weight:800"><td>${LANG==='ar'?'الإجمالي':'Total'}</td><td class="num">${F(histTotal)}</td><td>100%</td><td>—</td></tr>`;

    trend=Object.values(dm).sort((a,b)=>a.d.localeCompare(b.d));}

  const tv=tail(trend,PERIOD.qab);
  mk('cQABtrend',{type:'line',data:{labels:tv.map(e=>e.d.slice(5)),datasets:[{
