/* ===================== Login & Permissions ===================== */
let CURRENT_USER=null, USER_PERMS=null;
const PERM_TABS={tab_exec:'exec',tab_rx:'rx',tab_wb:'wb',tab_stk:'stk',tab_invan:'invan',tab_abc:'abc',tab_reports:'reports',tab_prod:'prod',tab_sales:'sales',tab_orders:'orders',tab_plant:'plant',tab_quality:'quality',tab_top:'top',tab_offals:'offals',tab_wdist:'wdist',tab_cmp:'cmp',tab_vs:'vs',tab_geo:'geo',tab_week:'week',tab_month:'month',tab_products:'sku'};
function parseUsers(mat){
  if(!mat||!mat.length)return [];
  // find header row containing 'username' and 'password'
  let hr=0;
  for(let r=0;r<Math.min(4,mat.length);r++){const row=(mat[r]||[]).map(x=>String(x||'').trim().toLowerCase());
    if(row.includes('username')&&row.includes('password')){hr=r;break;}}
  const head=(mat[hr]||[]).map(x=>String(x||'').trim().toLowerCase());
  const idx={};head.forEach((h,i)=>{idx[h]=i;});
  const users=[];
  for(let r=hr+1;r<mat.length;r++){const row=mat[r];if(!row)continue;
    const u=String(row[idx['username']]||'').trim();if(!u)continue;
    const role=String(row[idx['role']]||'viewer').trim().toLowerCase();
    // skip stray header/note rows: role must be a valid keyword
    if(!['admin','editor','viewer'].includes(role))continue;
    const rec={username:u,password:String(row[idx['password']]||'').trim(),
      role:role,
      active:String(row[idx['active']]!=null?row[idx['active']]:'yes').trim().toLowerCase()!=='no',perms:{}};
    Object.keys(PERM_TABS).concat(['can_refresh','can_import','can_export','can_export_data']).forEach(k=>{
      const v=idx[k]!=null?String(row[idx[k]]||'').trim().toLowerCase():'yes';
      rec.perms[k]=(v==='yes'||v==='true'||v==='1');});
    users.push(rec);}
  return users;
}
async function fetchUsers(){
  try{const mat=await fetchTab(GS.users,null,0);return parseUsers(mat);}catch(e){console.error('users fetch failed',e);return null;}
}
function applyPerms(rec){
  USER_PERMS=rec; CURRENT_USER=rec.username;
  const isAdmin=rec.role==='admin';
  // hide nav tabs without permission (nav buttons use data-t)
  document.querySelectorAll('nav button').forEach(b=>{
    const tab=b.dataset.t; if(!tab)return;
    const permKey=Object.keys(PERM_TABS).find(k=>PERM_TABS[k]===tab);
    const allowed=isAdmin||!permKey||rec.perms[permKey];
    b.classList.toggle('navHidden',!allowed);
  });
  // hide action controls without permission
  const setEl=(el,ok)=>{if(el)el.style.display=ok?'':'none';};
  setEl(document.getElementById('openImport'),isAdmin||rec.perms['can_import']);
  // data-export (xlsx) permission: admin always; else the column value; default true if column absent
  CAN_EXPORT = isAdmin ? true : (rec.perms['can_export_data']!==undefined ? !!rec.perms['can_export_data'] : true);
  // hide all xlsx buttons if not permitted
  document.querySelectorAll('.xlsxBtn').forEach(b=>b.style.display=CAN_EXPORT?'':'none');
  // refresh controls: the "↻ تحديث الآن" link (liveRef) + header excel-refresh button
  const canRefresh=isAdmin||rec.perms['can_refresh'];
  const lr=document.getElementById('liveRef'); if(lr)lr.style.display=canRefresh?'':'none';
  document.querySelectorAll('.hdrRefresh').forEach(el=>setEl(el,canRefresh));
  // show logout + current user
  const lo=document.getElementById('logoutBtn'); if(lo){lo.style.display='';lo.title=rec.username+' ('+rec.role+')';}
  // jump to first visible tab
  const firstVisible=[...document.querySelectorAll('nav button:not(.navHidden)')][0];
  if(firstVisible)firstVisible.click();
}
function doLogout(){
  try{localStorage.removeItem('sk_auth');}catch(e){}
  CURRENT_USER=null;USER_PERMS=null;
  document.body.classList.add('locked');
  const ov=$('#loginOverlay');if(ov)ov.style.display='flex';
  const pass=$('#loginPass');if(pass)pass.value='';
}
async function attemptLogin(user,pass,remember){
  const err=$('#loginError'), ld=$('#loginLoading');
  err.textContent=''; ld.style.display='block';
  let users=await fetchUsers();
  ld.style.display='none';
  if(!users){err.textContent=(LANG==='ar'?'تعذّر الوصول لقائمة المستخدمين — تأكد من مشاركة الشيت':'Could not reach the users sheet — check sharing');return false;}
  const rec=users.find(u=>u.username.toLowerCase()===user.toLowerCase());
  if(!rec||rec.password!==pass){err.textContent=(LANG==='ar'?'اسم المستخدم أو كلمة المرور غير صحيحة':'Invalid username or password');return false;}
  if(!rec.active){err.textContent=(LANG==='ar'?'هذا الحساب موقوف':'This account is inactive');return false;}
  // success
  try{
    if(remember)localStorage.setItem('sk_auth',JSON.stringify({u:rec.username,p:rec.password,r:true}));
    else localStorage.setItem('sk_auth',JSON.stringify({u:rec.username,r:false}));  // remember username only
  }catch(e){}
  $('#loginOverlay').style.display='none';
  document.body.classList.remove('locked');
  applyPerms(rec);
  return true;
}
function initAuth(){
  document.body.classList.add('locked');
  const ov=$('#loginOverlay'); if(ov)ov.style.display='flex';
  // prefill from saved
  let saved=null; try{saved=JSON.parse(localStorage.getItem('sk_auth')||'null');}catch(e){}
  if(saved&&saved.u){ $('#loginUser').value=saved.u; $('#loginRemember').checked=!!saved.r;
    if(saved.r&&saved.p){ $('#loginPass').value=saved.p; /* auto-login */ 
      attemptLogin(saved.u,saved.p,true); } }
  $('#loginBtn').onclick=()=>{const u=$('#loginUser').value.trim(),p=$('#loginPass').value,r=$('#loginRemember').checked;
    if(!u||!p){$('#loginError').textContent=(LANG==='ar'?'أدخل اسم المستخدم وكلمة المرور':'Enter username and password');return;}
    attemptLogin(u,p,r);};
  $('#loginPass').onkeydown=e=>{if(e.key==='Enter')$('#loginBtn').click();};
  $('#loginUser').onkeydown=e=>{if(e.key==='Enter')$('#loginPass').focus();};
  const lo=$('#logoutBtn'); if(lo)lo.onclick=()=>doLogout();
  const llb=$('#loginLangBtn'); if(llb)llb.onclick=()=>{LANG=LANG==='ar'?'en':'ar';try{localStorage.setItem('sk_lang',LANG)}catch(e){};applyLoginLang();renderAll();};
  const ltb=$('#loginThemeBtn'); if(ltb)ltb.onclick=()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';try{localStorage.setItem('sk_theme',h.dataset.theme)}catch(e){};applyLoginLang();renderAll();};
  applyLoginLang();
}
function applyLoginLang(){
  const ar=LANG==='ar';
  document.documentElement.dir=ar?'rtl':'ltr';
  const set=(id,txt)=>{const e=document.getElementById(id);if(e)e.textContent=txt;};
  set('loginTitle',ar?'تسجيل الدخول':'Sign in');
  set('loginSub',ar?'شركة سما كربلاء — التقرير التنفيذي':'Sama Karbala — Executive Report');
  set('rememberLbl',ar?'تذكّرني':'Remember me');
  set('loginBtn',ar?'دخول':'Sign in');
  const u=document.getElementById('loginUser'); if(u)u.placeholder=ar?'اسم المستخدم':'Username';
  const p=document.getElementById('loginPass'); if(p)p.placeholder=ar?'كلمة المرور':'Password';
  const llb=document.getElementById('loginLangBtn'); if(llb)llb.textContent=ar?'EN / ع':'ع / EN';
  const ltb=document.getElementById('loginThemeBtn'); if(ltb)ltb.textContent=document.documentElement.dataset.theme==='dark'?'☀️':'🌙';
}


function demandWeeklyFiltered(D, catFilter, ffFilter){
  // returns [{wk,label,fc,ao,as}] summed over products matching filters ('' = all)
  const wkMap={};
  D.weeks.forEach(w=>{wkMap[w.wk]={wk:w.wk,label:w.label,fc:0,ao:0,as:0};});
  D.products.forEach(p=>{
    if(catFilter && p.cat!==catFilter)return;
    if(ffFilter && p.ff!==ffFilter)return;
    p.wk.forEach(d=>{const m=wkMap[d.wk];if(!m)return;m.fc+=d.fc;m.ao+=d.ao;m.as+=d.as;});
  });
  return D.weeks.map(w=>wkMap[w.wk]).filter(w=>w.ao>0||w.fc>0);
}










// ============== REPORT ENGINE (grouped by category/family, with closing stock) ==============
// metricKey: 'dS'/'dP'/'dO'. Groups the filtered products by category+family (no product rows),
// computes total boxes/kg, daily average, and closing stock at the report end date.
function computeReport(metricKey, from, to, F){
  if(!SKU_DATES.length)return null;
  F=F||{};
  const idxs=[]; SKU_DATES.forEach((d,i)=>{ if((!from||d>=from)&&(!to||d<=to)) idxs.push(i); });
  if(!idxs.length)return null;
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat,F.cat));
  sku=sku.filter(p=>msPass(p.fam||'—',F.fam));
  if(F.ff&&F.ff.length) sku=sku.filter(p=>F.ff.includes(detectType(p)));
  if(F.own&&F.own.length) sku=sku.filter(p=>F.own.includes(classifyOwn(p)));
  if(F.pack&&F.pack.length) sku=sku.filter(p=>F.pack.includes(packType(p.n)));
  if(F.brand&&F.brand.length) sku=sku.filter(p=>F.brand.includes(String(p.brand||'—')));
  if(F.prod&&F.prod.length) sku=sku.filter(p=>F.prod.includes(String(p.c)));
  const nDays=idxs.length;
  const lastIdx=idxs[idxs.length-1];
  // find the latest index ≤ report end that has any stock balance (closing stock date)
  let stockIdx=-1;
  for(let k=idxs.length-1;k>=0;k--){ const i=idxs[k];
    if(sku.some(p=>(p.dC&&p.dC[i]>0)||(p.dK&&p.dK[i]>0))){ stockIdx=i; break; } }
  // group by category → family
  const groups={};
  sku.forEach(p=>{
    const bk=prodBoxKg(p)||0; const arr=p[metricKey]||[];
    let boxes=0; idxs.forEach(i=>{boxes+=(arr[i]||0);});
    let stockBoxes=0;
    if(stockIdx>=0){ const c=(p.dC&&p.dC[stockIdx]!=null&&p.dC[stockIdx]>0)?p.dC[stockIdx]:((p.dK&&p.dK[stockIdx])||0); stockBoxes=c||0; }
    const catK=p.cat||'—', famK=p.fam||'—';
    if(!groups[catK])groups[catK]={cat:catK,fams:{},boxes:0,kg:0,stockBoxes:0,stockKg:0,n:0};
    const g=groups[catK];
    if(!g.fams[famK])g.fams[famK]={fam:famK,boxes:0,kg:0,stockBoxes:0,stockKg:0,n:0};
    const f=g.fams[famK];
    if(boxes>0||stockBoxes>0){
      g.boxes+=boxes; g.kg+=boxes*bk; g.stockBoxes+=stockBoxes; g.stockKg+=stockBoxes*bk; g.n++;
      f.boxes+=boxes; f.kg+=boxes*bk; f.stockBoxes+=stockBoxes; f.stockKg+=stockBoxes*bk; f.n++;
    }
  });
  const cats=Object.values(groups).filter(g=>g.boxes>0||g.stockBoxes>0).map(g=>({
    cat:g.cat, n:g.n, boxes:Math.round(g.boxes), kg:Math.round(g.kg),
    avgBoxes:+(g.boxes/nDays).toFixed(1), avgKg:Math.round(g.kg/nDays),
    stockBoxes:Math.round(g.stockBoxes), stockKg:Math.round(g.stockKg),
    fams:Object.values(g.fams).filter(f=>f.boxes>0||f.stockBoxes>0).map(f=>({
      fam:f.fam, n:f.n, boxes:Math.round(f.boxes), kg:Math.round(f.kg),
      avgBoxes:+(f.boxes/nDays).toFixed(1), avgKg:Math.round(f.kg/nDays),
      stockBoxes:Math.round(f.stockBoxes), stockKg:Math.round(f.stockKg)
    })).sort((a,b)=>b.boxes-a.boxes)
  })).sort((a,b)=>b.boxes-a.boxes);
  const tot=cats.reduce((a,g)=>({boxes:a.boxes+g.boxes,kg:a.kg+g.kg,stockBoxes:a.stockBoxes+g.stockBoxes,stockKg:a.stockKg+g.stockKg,n:a.n+g.n}),{boxes:0,kg:0,stockBoxes:0,stockKg:0,n:0});
  return {cats, tot, nDays, from:SKU_DATES[idxs[0]], to:SKU_DATES[lastIdx],
    stockAsof: stockIdx>=0?SKU_DATES[stockIdx]:null, metricKey};
}

// Shared filter helper for report engines
function _rptFilterSku(F){
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat,F.cat));
  sku=sku.filter(p=>msPass(p.fam||'—',F.fam));
  if(F.ff&&F.ff.length) sku=sku.filter(p=>F.ff.includes(detectType(p)));
  if(F.own&&F.own.length) sku=sku.filter(p=>F.own.includes(classifyOwn(p)));
  if(F.pack&&F.pack.length) sku=sku.filter(p=>F.pack.includes(packType(p.n)));
  if(F.brand&&F.brand.length) sku=sku.filter(p=>F.brand.includes(String(p.brand||'—')));
  if(F.prod&&F.prod.length) sku=sku.filter(p=>F.prod.includes(String(p.c)));
  return sku;
}
function _rptIdxs(from,to){ const idxs=[]; SKU_DATES.forEach((d,i)=>{ if((!from||d>=from)&&(!to||d<=to)) idxs.push(i); }); return idxs; }

// (1) Order Fulfilment: per cat/fam — orders, production, sales, coverage %, fulfilment %, shortfall
function computeRptFulfil(from,to,F){
  if(!SKU_DATES.length)return null;
  const idxs=_rptIdxs(from,to); if(!idxs.length)return null;
  const sku=_rptFilterSku(F||{});
  const groups={};
  sku.forEach(p=>{const bk=prodBoxKg(p)||0;
    let o=0,pr=0,s=0; idxs.forEach(i=>{o+=(p.dO&&p.dO[i])||0;pr+=(p.dP&&p.dP[i])||0;s+=(p.dS&&p.dS[i])||0;});
    if(o<=0&&pr<=0&&s<=0)return;
    const cK=p.cat||'—',fK=p.fam||'—';
    if(!groups[cK])groups[cK]={cat:cK,fams:{},o:0,p:0,s:0,oKg:0,pKg:0,sKg:0,n:0,_sku:[]};
    const g=groups[cK]; if(!g.fams[fK])g.fams[fK]={fam:fK,o:0,p:0,s:0,oKg:0,pKg:0,sKg:0,n:0,_sku:[]};
    const f=g.fams[fK];
    g.o+=o;g.p+=pr;g.s+=s;g.oKg+=o*bk;g.pKg+=pr*bk;g.sKg+=s*bk;g.n++;g._sku.push(p);
    f.o+=o;f.p+=pr;f.s+=s;f.oKg+=o*bk;f.pKg+=pr*bk;f.sKg+=s*bk;f.n++;f._sku.push(p);});
  const roll=e=>{const oc=computeOpenClose(e._sku||[],from,to);
    return {...e,o:Math.round(e.o),p:Math.round(e.p),s:Math.round(e.s),
    covP:e.o>0?+(e.p/e.o*100).toFixed(1):null, covS:e.o>0?+(e.s/e.o*100).toFixed(1):null,
    short:Math.round(Math.max(0,e.o-Math.max(e.p,e.s))),
    open:oc.openBox, close:oc.closeBox};};
  const cats=Object.values(groups).map(g=>({...roll(g),fams:Object.values(g.fams).map(roll).sort((a,b)=>b.o-a.o)})).sort((a,b)=>b.o-a.o);
  const T=cats.reduce((a,g)=>({o:a.o+g.o,p:a.p+g.p,s:a.s+g.s,n:a.n+g.n}),{o:0,p:0,s:0,n:0});
  const totOC=computeOpenClose(sku,from,to);
  const tot={...roll({...T,oKg:0,pKg:0,sKg:0,_sku:[]}),open:totOC.openBox,close:totOC.closeBox};
  return {cats,tot,nDays:idxs.length,from:SKU_DATES[idxs[0]],to:SKU_DATES[idxs[idxs.length-1]],openDate:totOC.openDate,closeDate:totOC.closeDate};
}

// (4) Brand performance: per brand — boxes, kg, share %, daily avg, active products, own/PL
function computeRptBrand(metricKey,from,to,F){
  if(!SKU_DATES.length)return null;
  const idxs=_rptIdxs(from,to); if(!idxs.length)return null;
  const sku=_rptFilterSku(F||{});
  const bmap={};
  sku.forEach(p=>{const bk=prodBoxKg(p)||0;const arr=p[metricKey]||[];
    let v=0; idxs.forEach(i=>{v+=arr[i]||0;});
    if(v<=0)return;
    const b=String(p.brand||'—');
    if(!bmap[b])bmap[b]={brand:b,own:classifyOwn(p),boxes:0,kg:0,n:0};
    bmap[b].boxes+=v;bmap[b].kg+=v*bk;bmap[b].n++;});
  const totB=Object.values(bmap).reduce((a,x)=>a+x.boxes,0);
  const brands=Object.values(bmap).sort((a,b)=>b.boxes-a.boxes).map(b=>({brand:b.brand,own:b.own,n:b.n,
    boxes:Math.round(b.boxes),kg:Math.round(b.kg),pct:totB?+(b.boxes/totB*100).toFixed(1):0,
    avgBoxes:Math.round(b.boxes/idxs.length)}));
  const tot={boxes:Math.round(totB),kg:Math.round(brands.reduce((a,b)=>a+b.kg,0)),n:brands.reduce((a,b)=>a+b.n,0)};
  return {brands,tot,nDays:idxs.length,from:SKU_DATES[idxs[0]],to:SKU_DATES[idxs[idxs.length-1]]};
}

// (5) Fresh vs Frozen: group by type then category
function computeRptFF(metricKey,from,to,F){
  if(!SKU_DATES.length)return null;
  const idxs=_rptIdxs(from,to); if(!idxs.length)return null;
  const sku=_rptFilterSku(F||{});
  const groups={};
  sku.forEach(p=>{const bk=prodBoxKg(p)||0;const arr=p[metricKey]||[];
    let v=0; idxs.forEach(i=>{v+=arr[i]||0;});
    if(v<=0)return;
    const tK=detectType(p)||'—', cK=p.cat||'—';
    if(!groups[tK])groups[tK]={typ:tK,cats:{},boxes:0,kg:0,n:0};
    const g=groups[tK]; if(!g.cats[cK])g.cats[cK]={cat:cK,boxes:0,kg:0,n:0};
    g.boxes+=v;g.kg+=v*bk;g.n++; g.cats[cK].boxes+=v;g.cats[cK].kg+=v*bk;g.cats[cK].n++;});
  const totB=Object.values(groups).reduce((a,g)=>a+g.boxes,0);
  const types=Object.values(groups).sort((a,b)=>b.boxes-a.boxes).map(g=>({typ:g.typ,n:g.n,
    boxes:Math.round(g.boxes),kg:Math.round(g.kg),pct:totB?+(g.boxes/totB*100).toFixed(1):0,
    avgBoxes:Math.round(g.boxes/idxs.length),
    cats:Object.values(g.cats).sort((a,b)=>b.boxes-a.boxes).map(c=>({cat:c.cat,n:c.n,boxes:Math.round(c.boxes),kg:Math.round(c.kg),avgBoxes:Math.round(c.boxes/idxs.length)}))}));
  const tot={boxes:Math.round(totB),kg:Math.round(types.reduce((a,g)=>a+g.kg,0)),n:types.reduce((a,g)=>a+g.n,0)};
  return {types,tot,nDays:idxs.length,from:SKU_DATES[idxs[0]],to:SKU_DATES[idxs[idxs.length-1]]};
}

  $id('Note')&&($id('Note').textContent=AR?'اختيار المنتجات يُستخدم للحساب فقط — التقرير يعرض المجاميع حسب الفئة والعائلة. رصيد الإقفال = آخر يوم ضمن مدة التقرير فيه أرصدة مخزون.':'Product selection feeds the calculation only — the report shows category/family totals. Closing stock = latest day within the report period that has balances.');
}


// ============== DEMAND STABILITY (XYZ) REPORT ENGINE ==============
// Per-product coefficient of variation (CV = stddev/mean) for orders/sales/production
// over working days in range. X: CV≤25% stable, Y: 25-50%, Z: >50% volatile.
function computeRptStability(from,to,F){
  if(!SKU_DATES.length)return null;
  const idxs=_rptIdxs(from,to); if(!idxs.length)return null;
  const sku=_rptFilterSku(F||{});
  // working days = days with any company-wide activity (excludes Fridays-off/holidays)
  const act=[];
  idxs.forEach(i=>{let on=false;
    for(const p of (DATA.sku||[])){ if(((p.dS&&p.dS[i])||0)>0||((p.dO&&p.dO[i])||0)>0||((p.dP&&p.dP[i])||0)>0){on=true;break;} }
    if(on)act.push(i);});
  if(act.length<5)return null;
  const stats=arr=>{const n=arr.length;const mean=arr.reduce((a,b)=>a+b,0)/n;
    const nz=arr.filter(v=>v>0).length;
    if(mean<=0)return {mean:0,cv:null,nz};
    const va=arr.reduce((a,b)=>a+(b-mean)*(b-mean),0)/n;
    return {mean,cv:Math.sqrt(va)/mean*100,nz};};
  const rows=[];
  sku.forEach(p=>{
    const o=stats(act.map(i=>(p.dO&&p.dO[i])||0));
    const s=stats(act.map(i=>(p.dS&&p.dS[i])||0));
    const pr=stats(act.map(i=>(p.dP&&p.dP[i])||0));
    if(o.mean<=0&&s.mean<=0)return;   // no meaningful demand
    const base=o.mean>0?o:s;          // classify primarily on ORDERS; fallback to sales
    const cv=base.cv;
    const cls=cv==null?'—':(cv<=25?'X':cv<=50?'Y':'Z');
    rows.push({code:p.c,n:p.n,nAr:p.nAr,cat:p.cat,brand:String(p.brand||'—'),
      reg:Math.round(base.nz/act.length*100),
      oAvg:+o.mean.toFixed(1),oCv:o.cv==null?null:+o.cv.toFixed(1),
      sAvg:+s.mean.toFixed(1),sCv:s.cv==null?null:+s.cv.toFixed(1),
      pAvg:+pr.mean.toFixed(1),pCv:pr.cv==null?null:+pr.cv.toFixed(1),
      cls});
  });
  rows.sort((a,b)=>{const av=a.oCv==null?1e9:a.oCv,bv=b.oCv==null?1e9:b.oCv;return av-bv;});
  const counts={X:0,Y:0,Z:0};rows.forEach(r=>{if(counts[r.cls]!=null)counts[r.cls]++;});
  return {rows,counts,nDays:act.length,from:SKU_DATES[idxs[0]],to:SKU_DATES[idxs[idxs.length-1]]};
}

let VS={af:null,at:null,bf:null,bt:null,metric:'s',_auto:true,_lbl:null,cat:[],fam:[],ff:[],own:[],brand:[],pack:[],prod:[]};
function _vsMonthRange(lbl){const p=String(lbl||'').split('/');const m=+p[0],y=+p[1];
  if(!m||!y)return null;const f=new Date(Date.UTC(y,m-1,1)),t=new Date(Date.UTC(y,m,0));return[iso(f),iso(t)]}
function _vsShift(dstr,n){const d=new Date(dstr+'T00:00:00Z');d.setUTCDate(d.getUTCDate()+n);return iso(d)}
function _vsFilteredSku(){
  let sku=(DATA.sku||[]).slice();
  sku=sku.filter(p=>msPass(p.cat, VS.cat));
  sku=sku.filter(p=>msPass(p.fam||'—', VS.fam));
  if(VS.ff&&VS.ff.length) sku=sku.filter(p=>VS.ff.includes(detectType(p)));
  if(VS.own&&VS.own.length) sku=sku.filter(p=>VS.own.includes(classifyOwn(p)));
  if(VS.pack&&VS.pack.length) sku=sku.filter(p=>VS.pack.includes(packType(p.n)));
  if(VS.brand&&VS.brand.length) sku=sku.filter(p=>VS.brand.includes(String(p.brand||'—')));
  if(VS.prod&&VS.prod.length) sku=sku.filter(p=>VS.prod.includes(String(p.c)));
  return sku;
}
// aggregate filtered products over [f,t] using per-product daily arrays (dS/dO/dP), boxes
function _vsSum(f,t){
  const idxs=[]; SKU_DATES.forEach((d,i)=>{ if(d>=f&&d<=t) idxs.push(i); });
  const sku=_vsFilteredSku();
  const ds=[],dO=[],dP=[],dates=[];
  let s=0,o=0,p=0,op=0;
  idxs.forEach(i=>{let sv=0,ov=0,pv=0;
    sku.forEach(pp=>{sv+=(pp.dS&&pp.dS[i])||0;ov+=(pp.dO&&pp.dO[i])||0;pv+=(pp.dP&&pp.dP[i])||0;});
    s+=sv;o+=ov;p+=pv; if(sv>0)op++;
    ds.push(Math.round(sv));dO.push(Math.round(ov));dP.push(Math.round(pv));dates.push(SKU_DATES[i]);});
  return {s:Math.round(s),o:Math.round(o),p:Math.round(p),op,ds,dO,dP,dates,n:idxs.length,
    ful:o>0?s/o:null, avg:op?Math.round(s/op):0};
}

// JSONP gviz with a custom tq query — returns {cols:[{id,label}],rows:[[...]]}
function gvQuery(id,sheet,tq,hdrs){
  return new Promise((resolve,reject)=>{
    const h='__gv'+(__gvN++);
    let done=false;
    const timer=setTimeout(()=>{if(!done){done=true;cleanup();reject('geo (timeout)')}},45000);
    function cleanup(){clearTimeout(timer);try{delete window[h]}catch(e){window[h]=undefined};if(s.parentNode)s.parentNode.removeChild(s)}
    window[h]=resp=>{
      if(done)return;done=true;
      try{
        if(!resp||resp.status==='error')throw (resp&&resp.errors&&resp.errors[0]&&resp.errors[0].detailed_message)||'gviz error';
        const conv=c=>{if(!c||c.v==null)return '';
          if(c.v instanceof Date)return new Date(Date.UTC(c.v.getFullYear(),c.v.getMonth(),c.v.getDate()));
          return c.v;};
        const ncols=(resp.table.cols||[]).length;
        const rows=resp.table.rows.map(r=>{const cells=(r.c||[]).map(conv);while(cells.length<ncols)cells.push('');return cells;});
        const cols=(resp.table.cols||[]).map(c=>({id:c&&c.id||'',label:c&&c.label!=null?String(c.label):''}));
        cleanup();resolve({cols,rows});
      }catch(err){cleanup();reject('geo — '+err)}
    };
    let u='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?headers='+(hdrs==null?1:hdrs)+'&tqx=out:json;responseHandler:'+h+'&cb='+Date.now();
    if(sheet)u+='&sheet='+encodeURIComponent(sheet);
    if(tq)u+='&tq='+encodeURIComponent(tq);
    const s=document.createElement('script');
    s.src=u;
    s.onerror=()=>{if(!done){done=true;cleanup();reject('geo (network)')}};
    document.head.appendChild(s);
  });
}
function geoNorm(s){return String(s||'').trim().toLowerCase()}
// gviz date cell → UTC Date. Handles real Date objects AND raw string form "Date(2026,5,13)" (month 0-based) AND "yyyy-mm-dd"
function geoDate(v){
  if(v instanceof Date)return isNaN(+v)?null:v;
  if(typeof v==='string'){
    let m=v.match(/^Date\((\d+),(\d+),(\d+)/);
    if(m)return new Date(Date.UTC(+m[1],+m[2],+m[3]));
    m=v.trim().match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(m)return new Date(Date.UTC(+m[1],+m[2]-1,+m[3]));
  }
  return null;
}
// resilient header→letter map (order-proof like colMap)
async function geoHeaders(){

  const out={};
  for(const k in need){const L=map[need[k]];if(!L)throw (LANG==='ar'?'عمود مفقود بالشيت: ':'Missing column: ')+need[k];out[k]=L;}

async function geoLoadCore(){
  GEO_HDR=await geoHeaders();
  const H=GEO_HDR;
  const q1=`select ${H.d},${H.gov},${H.ag},${H.agEn},sum(${H.ton}),sum(${H.cnt}) where ${H.d} is not null group by ${H.d},${H.gov},${H.ag},${H.agEn} order by ${H.d}`;
  const r1=await gvQuery(GS.geo,GS.geoTabs.M,q1,1);
  console.log('[geo] q1 rows:',r1.rows.length,'| sample date cell:',JSON.stringify(r1.rows[0]&&r1.rows[0][0]));
  const D=[];const agmap={};let mind=null,maxd=null;
  r1.rows.forEach(r=>{
    const dd=geoDate(r[0]); if(!dd)return;  // skip blank/invalid dates (stray rows in sheet)
    const ds=iso(dd),gov=String(r[1]||'').trim(),ag=String(r[2]||'').trim();
    if(!gov&&!ag)return;
    const en=String(r[3]||'').trim();if(en)agmap[ag]=en;
    D.push({d:ds,gov,ag,t:Number(r[4])||0,c:Number(r[5])||0});
    if(!mind||ds<mind)mind=ds; if(!maxd||ds>maxd)maxd=ds;
  });
  if(!D.length||!mind||!maxd)throw (LANG==='ar'?'ماكو تواريخ صالحة بعمود التاريخ بالماستر شيت':'No valid dates found in the date column');
  // catalog
  const cm=await fetchTab(GS.geo,GS.geoTabs.P);
  const ch={};(cm[0]||[]).forEach((h,i)=>{ch[geoNorm(h)]=i;});
  const gi=(row,k)=>ch[k]!=null?row[ch[k]]:'';
  const cat={};
  for(let i=1;i<cm.length;i++){const row=cm[i];if(!row)continue;
    const no=String(gi(row,'product no')||'').trim();if(!no)continue;
    cat[no]={nameAr:String(gi(row,'product name')||'').trim(),nameEn:String(gi(row,'product name en')||'').trim(),
      pack:String(gi(row,'packing')||'').trim(),ff:String(gi(row,'item type')||'').trim(),
      brand:String(gi(row,'brand')||'').trim(),own:String(gi(row,'own category')||'').trim(),
      cat:String(gi(row,'category 1')||gi(row,'category')||'').trim(),fam:String(gi(row,'family 1')||gi(row,'family')||'').trim(),
      wgt:gi(row,'weight(g)')===''?null:Number(gi(row,'weight(g)'))};}
  GEO_RAW={D,mind,maxd,agmap};GEO_CAT=cat;
  if(!GEO.from||!GEO.to){ // default: last 30 days ending at latest data day
    const end=new Date(maxd+'T00:00:00Z');const st=new Date(end);st.setUTCDate(st.getUTCDate()-29);
    GEO.to=maxd;GEO.from=iso(st)<mind?mind:iso(st);
  }
}
async function geoLoadRange(){
  if(!GEO_HDR||!GEO.from||!GEO.to)return;
  const key=GEO.from+'|'+GEO.to;
  if(key===GEO_RANGE_KEY&&GEO_PROD)return;

    const r2=await gvQuery(GS.geo,GS.geoTabs.M,q2,1);

function geoWrap(s,n){n=n||24;const w=String(s).split(/\s+/),out=[];let cur='';

function geoProdPass(no){

function geoPreset(p){
  if(!GEO_RAW)return;
  const mx=GEO_RAW.maxd,mn=GEO_RAW.mind;
  const end=new Date(mx+'T00:00:00Z');
  const day=n=>{const x=new Date(end);x.setUTCDate(x.getUTCDate()-n);const s=iso(x);return s<mn?mn:s};
  if(p==='7'){GEO.from=day(6);GEO.to=mx;}
  else if(p==='30'){GEO.from=day(29);GEO.to=mx;}
  else if(p==='90'){GEO.from=day(89);GEO.to=mx;}
  else if(p==='wk'){GEO.from=iso(satOf(end));GEO.to=mx;}
  else if(p==='mo'){GEO.from=mx.slice(0,8)+'01';GEO.to=mx;}
  else if(p==='pmo'){const y=+mx.slice(0,4),m=+mx.slice(5,7);const pm=m===1?12:m-1,py=m===1?y-1:y;
    const last=new Date(Date.UTC(py,pm,0));GEO.from=py+'-'+String(pm).padStart(2,'0')+'-01';GEO.to=iso(last);}
  else if(p==='ytd'){GEO.from=mx.slice(0,4)+'-01-01';if(GEO.from<mn)GEO.from=mn;GEO.to=mx;}
  else if(p==='all'){GEO.from=mn;GEO.to=mx;}
  renderGeo();
  clearTimeout(GEO_DEB);GEO_DEB=setTimeout(geoLoadRange,350);
}
function geoDays(){ // active sales days in range (gov/agent-filtered), plus calendar days

function geoPrevRange(){
  const cal=Math.round((new Date(GEO.to+'T00:00:00Z')-new Date(GEO.from+'T00:00:00Z'))/86400000)+1;
  const pf=new Date(GEO.from+'T00:00:00Z');pf.setUTCDate(pf.getUTCDate()-cal);
  const pt=new Date(GEO.from+'T00:00:00Z');pt.setUTCDate(pt.getUTCDate()-1);
  return{from:iso(pf),to:iso(pt),len:cal};
}

}

/* ===================== Excel compute engine ===================== */
const INFO=15;
const MON={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function xDate(v){if(v instanceof Date)return v;
 if(typeof v==='number'&&v>40000&&v<60000)return new Date(Math.round((v-25569)*86400*1000));
 if(typeof v==='string'){const s=v.trim();
  // gviz raw date form: Date(2026,5,13) — month is 0-based
  let gm=s.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
  if(gm)return new Date(Date.UTC(+gm[1],+gm[2],+gm[3]));
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return new Date(Date.UTC(+m[1],+m[2]-1,+m[3]));
  m=s.match(/^(\d{1,2})[-\/ ]([A-Za-z]{3,})[-\/ ](\d{2,4})$/);
  if(m&&MON[m[2].slice(0,3).toLowerCase()]!=null){let y=+m[3];if(y<100)y+=2000;
   return new Date(Date.UTC(y,MON[m[2].slice(0,3).toLowerCase()],+m[1]));}
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){let y=+m[3];if(y<100)y+=2000;return new Date(Date.UTC(y,+m[1]-1,+m[2]));}
  // "Monday, June 01, 2026" or "June 1, 2026"
  m=s.match(/([A-Za-z]{3,})\s+(\d{1,2}),?\s+(\d{4})/);
  if(m&&MON[m[1].slice(0,3).toLowerCase()]!=null)
   return new Date(Date.UTC(+m[3],MON[m[1].slice(0,3).toLowerCase()],+m[2]));
  // "01 June 2026"
  m=s.match(/^(\d{1,2})\s+([A-Za-z]{3,})\s+(\d{4})$/);
  if(m&&MON[m[2].slice(0,3).toLowerCase()]!=null)
   return new Date(Date.UTC(+m[3],MON[m[2].slice(0,3).toLowerCase()],+m[1]));}
 return null}
function NUM(v){if(typeof v==='number')return v;
 if(typeof v==='string'){const x=parseFloat(v.replace(/,/g,''));return isNaN(x)?0:x}
 return 0}
function iso(d){return d.toISOString().slice(0,10)}
function satOf(d){const x=new Date(d);const wd=(x.getUTCDay()+1)%7;x.setUTCDate(x.getUTCDate()-wd);return x}
function wlabel(sat){const y=sat.getUTCFullYear();let fs=new Date(Date.UTC(y,0,1));
 fs.setUTCDate(fs.getUTCDate()+((6-fs.getUTCDay()+7)%7));
 return 'W'+(Math.floor((sat-fs)/(7*86400000))+1)+'-'+y}
function getSheet(w,names){for(const n of names)if(w.Sheets[n])return w.Sheets[n];return null}
function toM(ws){return XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:0})}


/* ===================== NEW daily-receiving parser (monthly tabs) ===================== */
// Column layout (0-indexed after gviz): 0=Date,1=Day,2=incoming,3=weight,4=slaughtered,
// 5=mech_cond,6=med_cond,7=med_n,8=med_wt,9=wings_wt,10=mistake_n,11=mistake_wt,
// 12=stunner_n,13=stunner_wt,14=doa_n,15=doa_wt, then per-line blocks of 6:
// B01:16-21, B02:22-27, B03:28-33, B04:34-39, BRD:40-45 (sl,med,wings,mistake,stunner,doa)
function parseNewRXmonth(matrix){
  if(!matrix||matrix.length<2)return [];
  const out=[];
  // robust: scan ALL rows; a data row is any whose col0 parses as a valid date
  // (this auto-skips the group-header and field-header rows regardless of gviz offset)
  for(let r=0;r<matrix.length;r++){
    const row=matrix[r]; if(!row)continue;
    const dRaw=row[0]; if(dRaw==null||dRaw==='')continue;
    const d=xDate(dRaw); if(!d)continue;
    const incoming=NUM(row[2]);
    if(incoming==null||incoming===0)continue;  // skip empty/Friday days
    const num=i=>{const v=NUM(row[i]);return v?Math.round(v):null;};
    // per-line slaughter (for line totals) — lines B01..B04 + BRD slaughtered at offsets 16,22,28,34,40
    const lineSl={l1:num(16),l2:num(22),l3:num(28),l4:num(34),br:num(40)};
    // DOA: read from B01(21)+B03(33)+BRD(45) per the pair rule (B02,B04 left blank)
    const doaLines=(num(21)||0)+(num(33)||0)+(num(45)||0);
    const e={
      d:iso(d),
      v:Math.round(incoming),                 // incoming live birds
      wt:num(3),                              // incoming live weight (kg)
      sl:num(4),                              // total slaughtered
      mech:num(5),med:num(6),med_n:num(7),med_wt:num(8),
      wings_wt:num(9),mistake_n:num(10),mistake_wt:num(11),
      stunner_n:num(12),stunner_wt:num(13),
      doa:num(14)!=null?num(14):(doaLines||null),  // prefer daily DOA total, else line sum

    D.pdaily=pd;
    // daily comparison totals from os..ai
    const dcmp=[];
    for(let j=os;j<=ai;j++){if(!useDay(j))continue;let o=0,p=0,s=0;for(let r=1;r<=n;r++){o+=val('O',r,j);p+=val('P',r,j);s+=val('S',r,j);}
      dcmp.push({d:iso(dts[j].d),o:Math.round(o),p:Math.round(p),s:Math.round(s)});}
    // weekly comparison
    const wmap={};
    for(let j=0;j<=ai;j++){if(!useDay(j))continue;const sat=satOf(dts[j].d);const k=iso(sat);
      if(!(k in wmap))wmap[k]={label:wlabel(sat),frm:k,o:0,p:0,s:0,_anyOrd:false};
      let o=0,p=0,s=0;for(let r=1;r<=n;r++){o+=val('O',r,j);p+=val('P',r,j);s+=val('S',r,j);}
      wmap[k].o+=o;wmap[k].p+=p;wmap[k].s+=s;if(o>0)wmap[k]._anyOrd=true;}
    const wcmp=Object.values(wmap).filter(w=>w.o||w.p||w.s).sort((a,b)=>a.frm.localeCompare(b.frm))
      .map(w=>({label:w.label,frm:w.frm,o:Math.round(w.o),p:Math.round(w.p),s:Math.round(w.s),
        covP:w.o>0?+(w.p/w.o).toFixed(3):null,covS:w.o>0?+(w.s/w.o).toFixed(3):null,
        partial:!w._anyOrd}));
    // per-product coverage (full history, days with orders)
    const cov=[];
    for(let r=1;r<=n;r++){const I=rowsInfo[r-1];
      let to=0,tp=0,ts=0,sd=0,od=0;
      for(let j=0;j<=ai;j++){if(!useDay(j))continue;const o=val('O',r,j),p=val('P',r,j),s=val('S',r,j);
        to+=o;tp+=p;ts+=s; if(o>0){od++; if(p<o)sd++; }}
      if(to<=0)continue;
      // shortfall measured on TOTALS (period-level): unmet = ordered − fulfilled, floored at 0.
      // fulfilled = the better of production or sales (covers cases where order/prod/sales fall on different days).
      const fulfilled=Math.max(tp,ts);
      const sq=Math.max(0, to-fulfilled);
      cov.push({c:I.code,n:String(I.nm).replace(/^Carton |^Box /,''),cat:I.cat,
        ord:Math.round(to),prod:Math.round(tp),sales:Math.round(ts),
        covP:to>0?+(tp/to).toFixed(3):null,covS:to>0?+(ts/to).toFixed(3):null,
        shortDays:sd,ordDays:od,shortRate:od>0?+(sd/od).toFixed(3):null,shortQty:Math.round(sq)});}
    D.cmp={daily_cmp:dcmp,weekly_cmp:wcmp,prod_cov:cov,ord_start:iso(dts[os].d)};
  })();
  D.rx=rxMat?(parseRXmat(rxMat)||DATA.rx):DATA.rx;
  D.kpi.rxLast=D.rx&&D.rx.daily.length?D.rx.daily[D.rx.daily.length-1]:null;
  return D;
}

// For a given date range, returns the weight balance + per-product weight & % of net weight.

// classify packaging type from product name
function packType(name){
  const n=String(name||'').toLowerCase();
  if(/\bbulk\b|10 ?kg|15 ?kg/.test(n))return 'Bulk';
  if(/\biqf\b/.test(n))return 'IQF';
  if(/\btray\b|foam|فوم/.test(n))return 'Tray';
  if(/\bbag|bags\b|كيس|أكياس/.test(n))return 'Bag';
  if(/\bbox\b|carton|كرتون/.test(n))return 'Box';
  if(/\bpack\b|vacuum|فاكيوم/.test(n))return 'Pack';
  return 'Other';
}

/* ===================== Offals analysis engine ===================== */
// classify an offal product by name into heart/gizzard/liver/other
function offalType(name){
  const n=String(name||'').toLowerCase();
  if(/heart|قلب|قلوب/.test(n))return 'heart';
  if(/gizzard|قانص|حواصل|قوانص/.test(n))return 'gizzard';
  if(/liver|كبد/.test(n))return 'liver';
  return 'other';
}
// box weight (kg) for a product: prefer explicit wt; else pcs×unit if available
// How the 'wt' column is interpreted for box weight. Auto-detected, override via WT_MODE.
// 'boxkg'  = wt is already the full box/carton weight in kilograms (use directly)
// 'unitg'  = wt is per-piece weight in grams → box kg = wt × pcs / 1000
// 'unitkg' = wt is per-piece weight in kilograms → box kg = wt × pcs
// 'auto'   = pick per-product based on magnitude (safest default)
var WT_MODE='auto';
// product display name by current language (Arabic from col 1, English from col 3)
var _NAR_MAP=null;
function narMap(){ if(_NAR_MAP)return _NAR_MAP; _NAR_MAP={}; (DATA.sku||[]).forEach(p=>{ if(p.nAr)_NAR_MAP[String(p.c)]=p.nAr; }); return _NAR_MAP; }
function prodName(p){
  if(!p)return '';
  const enName=p.n||p.name||'';
  if(LANG==='ar'){
    let a=(p.nAr||p.nameAr||'').trim();
    if(!a){ const code=p.c!=null?p.c:(p.code!=null?p.code:null); if(code!=null)a=(narMap()[String(code)]||'').trim(); }
    if(a)return a;
  }
  return enName;
}
function prodBoxKg(p){
  const w=p.wt, pcs=p.pcs;
  if(!w) return null;
  if(WT_MODE==='boxkg') return w;                         // wt = box kg
  if(WT_MODE==='unitg')  return pcs?(w*pcs/1000):(w/1000);
  if(WT_MODE==='unitkg') return pcs?(w*pcs):w;
  // AUTO: infer from magnitude. Typical poultry box = 5..25 kg.
  // Case A: w looks like grams of a single piece (e.g. 1000g, 1100g) AND pcs present → box = w*pcs/1000
  if(pcs && w>=50){ const box=w*pcs/1000; if(box>=1 && box<=40) return box; }
  // Case B: w already a sensible box weight in kg (e.g. 10, 12, 15) → use directly
  if(w>=1 && w<=40) return w;
  // Case C: w is grams of the whole box (e.g. 10000g) → /1000
  if(w>40) return w/1000;
  return w;
}
// Build offals analysis: expected (from live intake × ratios) vs actual (offal production weight)
function computeOffals(from,to,typeFilter,ffFilter,ownFilter){
  if(!DATA.rx||!DATA.rx.daily)return null;
  const inRange=d=>(!from||d>=from)&&(!to||d<=to);
  const rxDays=DATA.rx.daily.filter(e=>inRange(e.d)&&e.wt);
  const totLiveWt=rxDays.reduce((a,e)=>a+(e.wt||0),0);
  // expected offal weight per type (always full — based on live weight)
  const expAll={
    heart:totLiveWt*OFFAL_RATIOS.heart,
    gizzard:totLiveWt*OFFAL_RATIOS.gizzard,
    liver:totLiveWt*OFFAL_RATIOS.liver
  };
  expAll.total=expAll.heart+expAll.gizzard+expAll.liver;
  // actual offal production by type (with optional fresh/frozen filter)
  let offalSku=(DATA.sku||[]).filter(p=>p.cat==='Offals');
  if(ffFilter&&ffFilter!=='all') offalSku=offalSku.filter(p=>detectType(p)===ffFilter);
  if(ownFilter&&ownFilter!=='all') offalSku=offalSku.filter(p=>classifyOwn(p)===ownFilter);
  const idxRange=[];
  if(SKU_DATES.length){SKU_DATES.forEach((d,i)=>{if(inRange(d))idxRange.push(i);});}
  const act={heart:0,gizzard:0,liver:0,other:0};
  const rows=[];
  offalSku.forEach(p=>{
    const boxKg=prodBoxKg(p)||0;
    let boxes=0;
    if(idxRange.length&&p.dP){idxRange.forEach(i=>{boxes+=(p.dP[i]||0);});}
    else boxes=p.pt||0;
    const kg=boxes*boxKg;
    const typ=offalType(p.n);
    act[typ]+=kg;
    if(kg>0||boxes>0) rows.push({code:p.c,name:p.n,typ,ff:detectType(p),boxes:Math.round(boxes),boxKg:+boxKg.toFixed(2),
      kg:Math.round(kg), exp:expAll[typ]||0});  // expected for this product's type (per-type total)
  });
  act.total=act.heart+act.gizzard+act.liver+act.other;
  // apply TYPE filter to the displayed rows + kpis (but keep expected per type)
  let dispRows=rows;
  if(typeFilter&&typeFilter!=='all') dispRows=rows.filter(r=>r.typ===typeFilter);
  dispRows.sort((a,b)=>b.kg-a.kg);
  const ach=t=>expAll[t]?(act[t]/expAll[t]):null;
  // filtered totals (for kpis when a type is selected)
  let kExp=expAll.total,kAct=act.total,kAch=expAll.total?act.total/expAll.total:null;
  if(typeFilter&&typeFilter!=='all'){
    kExp=expAll[typeFilter]||0; kAct=act[typeFilter]||0; kAch=kExp?kAct/kExp:null;
  }
  return {
    days:rxDays.length, totLiveWt:Math.round(totLiveWt),
    exp:{heart:Math.round(expAll.heart),gizzard:Math.round(expAll.gizzard),liver:Math.round(expAll.liver),total:Math.round(expAll.total)},
    act:{heart:Math.round(act.heart),gizzard:Math.round(act.gizzard),liver:Math.round(act.liver),other:Math.round(act.other),total:Math.round(act.total)},
    ach:{heart:ach('heart'),gizzard:ach('gizzard'),liver:ach('liver'),total:expAll.total?act.total/expAll.total:null},
    kExp:Math.round(kExp),kAct:Math.round(kAct),kAch,
    rows:dispRows, typeFilter:typeFilter||'all', ffFilter:ffFilter||'all'
  };
}

function catLabel(c){return (CAT_LABEL[LANG]&&CAT_LABEL[LANG][c])||c;}
// top N per category by metric field ('st'=sales,'ot'=orders,'pt'=production)
// metric: 'st'|'ot'|'pt' (totals). from/to: ISO dates (optional) → sum the daily series in range.
function topByCategory(metric, n, from, to){
  const sku=(DATA.sku||[]);
  const cats=[...new Set(sku.map(p=>p.cat).filter(Boolean))];
  const ordered=CAT_ORDER.filter(c=>cats.includes(c)).concat(cats.filter(c=>!CAT_ORDER.includes(c)));
  // map totals metric → daily-series field
  const dailyField={st:'dS',ot:'dO',pt:'dP'}[metric]||'dS';
  // precompute the index range over SKU_DATES if a from/to is given
  let i0=0,i1=(SKU_DATES.length-1);
  const useRange = (from||to) && SKU_DATES.length;
  if(useRange){
    i0=0;while(i0<SKU_DATES.length && from && SKU_DATES[i0]<from)i0++;
    i1=SKU_DATES.length-1;while(i1>=0 && to && SKU_DATES[i1]>to)i1--;
  }
  const valOf=p=>{
    if(!useRange) return p[metric]||0;
    const arr=p[dailyField]||[]; let s=0; for(let k=i0;k<=i1;k++)s+=arr[k]||0; return s;
  };
  const out={};
  ordered.forEach(cat=>{
    out[cat]=sku.filter(p=>p.cat===cat&&valOf(p)>0)
      .map(p=>({p,v:valOf(p)}))
      .sort((a,b)=>b.v-a.v).slice(0,n||10)
      .map((x,i)=>({rank:i+1,code:x.p.c,name:x.p.n,typ:detectType(x.p),sub:x.p.sub,val:x.v,
        st:x.p.st,ot:x.p.ot,pt:x.p.pt}));
  });
  return {cats:ordered,top:out,from:useRange?SKU_DATES[i0]:null,to:useRange?SKU_DATES[i1]:null};
}
// FPP-focused analysis: fresh/frozen split, family rollup, full product table

// Sum a daily series into buckets: 'day' (raw), 'week' (company Sat-start), 'month'
function bucketSeries(dailyArr, gran, from, to){
  if(!SKU_DATES.length||!dailyArr)return [];
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  if(gran==='day'){
    return SKU_DATES.map((d,i)=>({k:d,v:dailyArr[i]||0})).filter(e=>inR(e.k));
  }
  const map={};
  SKU_DATES.forEach((d,i)=>{
    if(!inR(d))return;
    const dt=new Date(d+'T00:00:00Z'); let key;
    if(gran==='week'){
      // company week starts Saturday: find the Saturday on/before this date
      const wd=(dt.getUTCDay()+1)%7; const sat=new Date(dt); sat.setUTCDate(dt.getUTCDate()-wd);
      key=sat.toISOString().slice(0,10);
    } else { // month
      key=d.slice(0,7); // YYYY-MM
    }
    map[key]=(map[key]||0)+(dailyArr[i]||0);
  });
  return Object.keys(map).sort().map(k=>({k,v:Math.round(map[k])}));
}
// own/PL classifier (shared)
function classifyOwn(p){
  // The sheet's 'Own/Private Label' column is authoritative — use it directly.
  const o=String(p.own||'').toLowerCase().trim();
  if(o.includes('private')||o==='pl'||o.includes('خاص'))return 'pl';   // 'Private Label' / 'private Label'
  if(o==='own'||o.includes('own')||o==='علامتنا')return 'own';
  // fallback (only if the column is blank): infer from brand/name
  const b=(String(p.brand||'')+' '+String(p.n||p.name||'')).toLowerCase();
  if(/rayan|ريان|sama|سما|karbala|كربلاء|bawadi|بوادي/.test(b))return 'own';
  return 'pl';
}
// Build a filtered, time-bucketed analysis for any category (default FPP)
// filters: {cat, own:'all'|'own'|'pl', ff:'all'|'Fresh'|'Frozen', metric:'dS'|'dO'|'dP', gran:'day'|'week'|'month', product:code|null, family:sub|null}

function detectType(p){
  // primary: explicit typ field if it clearly says frozen/fresh
  const t=String(p.typ||'').toLowerCase();
  if(/frozen|مجمد/.test(t))return 'Frozen';
  if(/fresh|طازج|فريش/.test(t))return 'Fresh';
  // fallback: the product NAME (reliable — e.g. "Bawadi Frozen ...")
  const n=String(p.n||p.name||'').toLowerCase();
  if(/frozen|مجمد/.test(n))return 'Frozen';
  if(/fresh|طازج|فريش/.test(n))return 'Fresh';
  return 'Fresh';
}
function computeFPP(){
  const sku=(DATA.sku||[]).filter(p=>p.cat==='FPP');
  if(!sku.length)return null;
  // detect own vs private label: explicit field, else brand name heuristic
  const ownOf=p=>{
    const o=String(p.own||'').toLowerCase();
    if(o.includes('own')||o==='علامتنا')return 'own';
    if(o.includes('private')||o.includes('pl')||o.includes('خاص'))return 'pl';
    const b=String(p.brand||p.n||'').toLowerCase();
    if(b.includes('bawadi')||b.includes('بوادي'))return 'pl';
    if(b.includes('rayan')||b.includes('sama')||b.includes('ريان')||b.includes('سما'))return 'own';
    return 'own';
  };
  // fresh/frozen split
  const ffSplit={Fresh:{st:0,ot:0,pt:0,n:0},Frozen:{st:0,ot:0,pt:0,n:0}};
  sku.forEach(p=>{const k=detectType(p);
    ffSplit[k].st+=p.st;ffSplit[k].ot+=p.ot;ffSplit[k].pt+=p.pt;ffSplit[k].n++;});
  // family (sub-family) rollup
  const fam={};
  sku.forEach(p=>{const f=p.sub||'—';fam[f]=fam[f]||{sub:f,st:0,ot:0,pt:0,n:0};
    fam[f].st+=p.st;fam[f].ot+=p.ot;fam[f].pt+=p.pt;fam[f].n++;});
  const families=Object.values(fam).sort((a,b)=>b.st-a.st);
  // own vs PL rollup
  const ownPL={own:{st:0,ot:0,pt:0,n:0},pl:{st:0,ot:0,pt:0,n:0}};
  sku.forEach(p=>{const k=ownOf(p);ownPL[k].st+=p.st;ownPL[k].ot+=p.ot;ownPL[k].pt+=p.pt;ownPL[k].n++;});
  // full product table
  const rows=sku.map(p=>({code:p.c,name:p.n,typ:detectType(p),
    sub:p.sub||'—',own:ownOf(p),st:p.st,ot:p.ot,pt:p.pt,ful:p.ful})).sort((a,b)=>b.st-a.st);
  return {ffSplit,families,ownPL,rows,total:{st:sku.reduce((a,p)=>a+p.st,0),ot:sku.reduce((a,p)=>a+p.ot,0),pt:sku.reduce((a,p)=>a+p.pt,0),n:sku.length}};
}

/* ===================== Table → Excel export ===================== */
// Reads a rendered <table> by id, builds a worksheet, downloads <name>_<date>.xlsx.
function exportTableXLSX(tableId, name){
  try{
    if(typeof CAN_EXPORT!=='undefined' && CAN_EXPORT===false){ alert(LANG==='ar'?'لا تملك صلاحية التصدير':'You do not have export permission'); return; }
    const tbl=document.getElementById(tableId);
    if(!tbl){ console.warn('export: table not found',tableId); return; }
    // Build a 2D array from the table rows (text content, strip pills/arrows)
    const rows=[];
    tbl.querySelectorAll('tr').forEach(tr=>{
      const cells=[...tr.querySelectorAll('th,td')].map(td=>{
        let txt=(td.textContent||'').trim();
        // convert pure-number-looking strings (with thousands commas) to numbers
        const numTest=txt.replace(/[,\s]/g,'').replace(/[▲▼]/g,'');
        if(/^-?\d+(\.\d+)?%?$/.test(numTest)){
          if(numTest.endsWith('%')) return txt;       // keep percent as text label
          const n=Number(numTest); if(!isNaN(n)) return n;
        }
        return txt;
      });
      if(cells.length) rows.push(cells);
    });
    if(!rows.length){ alert(LANG==='ar'?'لا توجد بيانات للتصدير':'No data to export'); return; }
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // auto column widths
    const colW=rows[0].map((_,c)=>({wch:Math.min(40,Math.max(8,...rows.map(r=>String(r[c]??'').length+2)))}));
    ws['!cols']=colW;
    const wb=XLSX.utils.book_new();
    const safe=(name||'data').replace(/[\\/?*\[\]:]/g,'').slice(0,28);
    XLSX.utils.book_append_sheet(wb,ws,safe||'Data');
    const today=(DATA&&DATA.kpi&&DATA.kpi.asof)?DATA.kpi.asof:new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, safe+'_'+today+'.xlsx');
  }catch(e){ console.error('exportTableXLSX failed',e); alert((LANG==='ar'?'تعذّر التصدير: ':'Export failed: ')+e.message); }
}

function coWeekday(dateStr){const d=new Date(dateStr+'T00:00:00Z');return (d.getUTCDay()+1)%7;}
function seriesStats(arr){
  const xs=arr.filter(v=>v!=null&&!isNaN(v));
  const n=xs.length; if(n<3)return null;
  const mean=xs.reduce((a,b)=>a+b,0)/n;
  const variance=xs.reduce((a,b)=>a+(b-mean)*(b-mean),0)/n;
  return {mean,sd:Math.sqrt(variance),n,min:Math.min(...xs),max:Math.max(...xs)};
}
// Day-of-week aware: compare latest meaningful day vs same weekday in prior weeks.
// linear regression on [{x,y}] -> {slope,intercept,predict(x),residSD}
function linReg(pts){
  const n=pts.length; if(n<3)return null;
  let sx=0,sy=0,sxx=0,sxy=0;
  pts.forEach(p=>{sx+=p.x;sy+=p.y;sxx+=p.x*p.x;sxy+=p.x*p.y;});
  const den=n*sxx-sx*sx; if(den===0)return null;
  const slope=(n*sxy-sx*sy)/den, intercept=(sy-slope*sx)/n;
  const predict=x=>slope*x+intercept;
  let ss=0; pts.forEach(p=>{const e=p.y-predict(p.x);ss+=e*e;});
  const residSD=Math.sqrt(ss/n);
  return {slope,intercept,predict,residSD,n};
}
function detectAnomaly(series){
  let pts=(series||[]).filter(p=>p&&p.v!=null&&!isNaN(p.v));
  while(pts.length && pts[pts.length-1].v===0) pts.pop();   // drop un-entered trailing days
  if(pts.length<3)return null;
  const lastP=pts[pts.length-1];
  const last=lastP.v, lastDate=lastP.d, lastDow=coWeekday(lastDate);
  // baseline = same-weekday history (excluding latest); fallback to all days if too short
  let baseHist=pts.slice(0,-1).filter(p=>coWeekday(p.d)===lastDow);
  let basis='dow';
  if(baseHist.length<3){ baseHist=pts.slice(0,-1); basis='all'; }
  if(baseHist.length<2)return null;
  // expected value: prefer a LINEAR TREND over the baseline (respects factory growth),
  // fall back to the simple mean when there aren't enough points for a stable trend.
  let mean, sd, expected, usedTrend=false;
  const reg = baseHist.length>=4 ? linReg(baseHist.map((p,i)=>({x:i,y:p.v}))) : null;
  const st = seriesStats(baseHist.map(p=>p.v));
  if(!st)return null;
  if(reg && isFinite(reg.slope)){
    // project the trend one step beyond the baseline (the latest point's position)
    expected = reg.predict(baseHist.length);
    sd = reg.residSD>0 ? reg.residSD : st.sd;   // deviation around the trend line
    usedTrend=true;
  } else {
    expected = st.mean; sd = st.sd;
  }
  mean=expected;
  const pct = expected ? ((last-expected)/expected) : 0, apct=Math.abs(pct);
  let z=0, absz=0, level='ok';
  if(sd>0){ z=(last-expected)/sd; absz=Math.abs(z); }
  if(absz>=3 && apct>=0.15)level='crit';
  else if(absz>=2 && apct>=0.10)level='warn';
  else if(absz>=1.3 && apct>=0.07)level='watch';
  if(level==='ok' && apct>=0.40)level='crit';
  else if(level==='ok' && apct>=0.25)level='warn';
  return {last,mean,sd,z,absz,level,dir:(last>=expected)?'up':'down',
    pctVsMean:pct,lastDate,n:baseHist.length,basis,usedTrend,
    dow:lastDow,dowAr:CO_DOW_AR[lastDow],dowEn:CO_DOW_EN[lastDow]};
}

/* ===================== Plant Processing engine (PDS) ===================== */
function colIdx(headerRow, names){
  // find column index whose header matches any of names (case-insensitive contains)
  for(let c=0;c<headerRow.length;c++){
    const h=String(headerRow[c]||'').trim().toLowerCase();
    if(names.some(nm=>h===nm||h.indexOf(nm)>=0))return c;
  }
  return -1;
}
function findHeaderRow(m, must){
  // strict: a header cell must EQUAL the key or be that single word (avoids matching a long merged
  // title like 'Daily Grades (mirrors PDS)' which contains 'grade'). Require ALL must-keys present.
  const cellMatch=(cell,key)=>{
    const h=String(cell||'').trim().toLowerCase();
    if(!h)return false;
    if(h===key)return true;
    // word-boundary match: key appears as a standalone token, and cell is short (a real header, not a sentence)
    if(h.length<=18 && (h===key || h.split(/[^a-z]+/).includes(key)))return true;
    return false;
  };
  let best=-1,bestScore=-1;
  for(let r=0;r<Math.min(8,m.length);r++){
    const row=m[r]||[];
    let score=0; for(const k of must){ if(row.some(c=>cellMatch(c,k)))score++; }
    if(score>bestScore){bestScore=score;best=r;}
    if(score===must.length)return r;  // perfect match, use it
  }
  return best>=0?best:0;
}
function computeProc(G, H, W){
  // ----- Grades sheet -----
  const out={days:[], lines:{}, grades:{}, hist:{}, weeks:{}, ord:['A','B','C','D','Z','Y','X','Rest']};
  if(G&&G.length){
    // Detect columns from the header if clean, else infer from the first data row that has a date.
    let head=null, cD=-1,cL=-1,cG=-1,cC=-1,cW=-1,cA=-1, dataStart=0;
    const hr=findHeaderRow(G,['date','line','grade','count']);
    head=G[hr];
    cD=colIdx(head,['date']);cL=colIdx(head,['line']);cG=colIdx(head,['grade']);
    cC=colIdx(head,['count']);cW=colIdx(head,['weight']);cA=colIdx(head,['avg weight','avg']);
    // If header is garbled (date or count missing), infer by scanning for first row with a valid date.
    if(cD<0||cC<0){
      let dr=-1, dc=-1;
      for(let r=0;r<G.length && dr<0;r++){
        const row=G[r]||[];
        for(let c=0;c<row.length;c++){ if(xDate(row[c])){dr=r;dc=c;break;} }
      }
      if(dr>=0){
        // template column order: Date, Line, Grade, Count, Weight, Avg  (relative to the date column)
        cD=dc; cL=dc+1; cG=dc+2; cC=dc+3; cW=dc+4; cA=dc+5; dataStart=dr;
      }
    } else { dataStart=hr+1; }
    for(let r=dataStart;r<G.length;r++){
      const row=G[r]; if(!row)continue;
      const d=xDate(row[cD]); if(!d)continue;
      const ln=String(row[cL]||'').trim(); const gr=String(row[cG]||'').trim();
      if(!ln||!gr)continue;
      const cnt=NUM(row[cC]), kg=NUM(row[cW]), avg=NUM(row[cA]);
      const dk=iso(d);
      out.grades[dk]=out.grades[dk]||{};
      out.grades[dk][ln]=out.grades[dk][ln]||{};
      out.grades[dk][ln][gr]={count:Math.round(cnt),kg:Math.round(kg),avg:Math.round(avg)};
    }
  }
  // ----- Histogram sheet -----
  if(H&&H.length){
    let cD=-1,cL=-1,cS=-1,cE=-1,gcols={},dataStart=0;
    const exact=(hdr,nm)=>{for(let c=0;c<hdr.length;c++){if(String(hdr[c]||'').trim().toLowerCase()===nm)return c;}return -1;};
    const hr=findHeaderRow(H,['date','line','start','end']);
    const head=H[hr];
    cD=colIdx(head,['date']);cL=colIdx(head,['line']);cS=colIdx(head,['start']);cE=colIdx(head,['end']);
    ['a','b','c','d','z','y','x','rest'].forEach(g=>{gcols[g]=exact(head,g)});
    if(cD<0||cS<0){
      // infer: find first row with a date; template order: Date,Line,Start,End,A,B,C,D,Z,Y,X,Rest,Total
      let dr=-1,dc=-1;
      for(let r=0;r<H.length && dr<0;r++){const row=H[r]||[];
        for(let c=0;c<row.length;c++){if(xDate(row[c])){dr=r;dc=c;break;}}}
      if(dr>=0){cD=dc;cL=dc+1;cS=dc+2;cE=dc+3;
        ['a','b','c','d','z','y','x','rest'].forEach((g,i)=>{gcols[g]=dc+4+i;});
        dataStart=dr;}
    } else { dataStart=hr+1; }
    for(let r=dataStart;r<H.length;r++){
      const row=H[r]; if(!row)continue;
      const d=xDate(row[cD]); if(!d)continue;
      const ln=String(row[cL]||'').trim(); if(!ln)continue;
      const s=NUM(row[cS]); const dk=iso(d);
      out.hist[dk]=out.hist[dk]||{};
      out.hist[dk][ln]=out.hist[dk][ln]||[];
      const bands={};['a','b','c','d','z','y','x','rest'].forEach(g=>bands[g.toUpperCase()==='REST'?'Rest':g.toUpperCase()]=NUM(row[gcols[g]]));
      out.hist[dk][ln].push({s:Math.round(s),e:NUM(row[cE]),bands,
        total:Object.values(bands).reduce((a,b)=>a+b,0)});
    }
  }
  // ----- Work hours sheet (optional) -----
  out.hours={};
  if(W&&W.length){
    let cD=-1,cL=-1,cH=-1,dataStart=0;
    const hr=findHeaderRow(W,['date','line','work']);
    const head=W[hr];
    cD=colIdx(head,['date']);cL=colIdx(head,['line']);cH=colIdx(head,['work hours','hours','work']);
    if(cD<0||cH<0){
      let dr=-1,dc=-1;
      for(let r=0;r<W.length&&dr<0;r++){const row=W[r]||[];for(let c=0;c<row.length;c++){if(xDate(row[c])){dr=r;dc=c;break;}}}
      if(dr>=0){cD=dc;cL=dc+1;cH=dc+2;dataStart=dr;}
    } else dataStart=hr+1;
    for(let r=dataStart;r<W.length;r++){const row=W[r];if(!row)continue;
      const d=xDate(row[cD]);if(!d)continue;const ln=String(row[cL]||'').trim();if(!ln)continue;
      const h=NUM(row[cH]);if(h>0){const dk=iso(d);out.hours[dk]=out.hours[dk]||{};out.hours[dk][ln]=h;}}
  }
  // ----- daily roll-up per line (exclude the 'Total' grade row to avoid double count) -----
  const dayset=new Set([...Object.keys(out.grades),...Object.keys(out.hist)]);
  out.days=[...dayset].sort();
  out.lineNames=new Set();
  out.daily=[]; // {d, line, count, kg, avg, ab, gradePct{}, doaApplied:false}
  for(const dk of out.days){
    const lines=out.grades[dk]||{};
    for(const ln in lines){
      out.lineNames.add(ln);
      const gd=lines[ln];
      // total from explicit Total row if present, else sum of A..Rest
      let cnt=0,kg=0;
      let hasTotal=gd['Total'];
      if(hasTotal){cnt=gd['Total'].count;kg=gd['Total'].kg;}
      else{for(const g of out.ord){if(gd[g]){cnt+=gd[g].count;kg+=gd[g].kg;}}}
      if(cnt<=0)continue;
      const ab=((gd['A']?gd['A'].count:0)+(gd['B']?gd['B'].count:0));
      const gradePct={};
      for(const g of out.ord){gradePct[g]=cnt>0?((gd[g]?gd[g].count:0)/cnt):0;}
      out.daily.push({d:dk,line:ln,count:cnt,kg:Math.round(kg),
        avg:cnt>0?Math.round(kg/cnt*1000):0,ab:ab,abPct:cnt>0?ab/cnt:0,gradePct});
    }
  }
  out.lineNames=[...out.lineNames];
  // weekly roll-up
  const wk={};
  for(const e of out.daily){
    const sat=satOf(new Date(e.d+'T00:00:00Z'));const k=iso(sat);
    wk[k]=wk[k]||{label:wlabel(sat),frm:k,count:0,kg:0,ab:0};
    wk[k].count+=e.count;wk[k].kg+=e.kg;wk[k].ab+=e.ab;
  }
  out.weekly=Object.values(wk).sort((a,b)=>a.frm.localeCompare(b.frm))
    .map(w=>({...w,avg:w.count>0?Math.round(w.kg/w.count*1000):0,abPct:w.count>0?w.ab/w.count:0}));
  out.asof=out.days.length?out.days[out.days.length-1]:null;
  return out;
}

function parseCSV(text){
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++} else q=false; } else cell+=ch; }
    else{ if(ch==='"')q=true;
      else if(ch===','){row.push(cell);cell='';}
      else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell='';}
      else if(ch==='\r'){}
      else cell+=ch; } }
  if(cell!==''||row.length){row.push(cell);rows.push(row);}
  return rows;
}
let __gvN=0;
function gvTab(id,sheet,hdrMode){
  return new Promise((resolve,reject)=>{
    const h='__gv'+(__gvN++);
    let done=false;
    const timer=setTimeout(()=>{if(!done){done=true;cleanup();reject(t().liveTab(sheet||'RX')+' (timeout)')}},30000);
    function cleanup(){clearTimeout(timer);try{delete window[h]}catch(e){window[h]=undefined};if(s.parentNode)s.parentNode.removeChild(s)}
    window[h]=resp=>{
      if(done)return;done=true;
      try{
        if(!resp||resp.status==='error')throw (resp&&resp.errors&&resp.errors[0]&&resp.errors[0].detailed_message)||'gviz error';
        const conv=c=>{if(!c||c.v==null)return '';
          if(c.v instanceof Date)return new Date(Date.UTC(c.v.getFullYear(),c.v.getMonth(),c.v.getDate()));
          return c.v;};
        const ncols=(resp.table.cols||[]).length;
        const rows=resp.table.rows.map(r=>{const cells=(r.c||[]).map(conv);
          while(cells.length<ncols)cells.push('');return cells;});
        if(hdrMode===0){cleanup();resolve(rows);}
        else{const hdr=(resp.table.cols||[]).map(c=>c&&c.label!=null?c.label:'');
          cleanup();resolve([hdr].concat(rows));}
      }catch(err){cleanup();reject(t().liveTab(sheet||'RX')+' — '+err)}
    };
    const hm=(hdrMode===0)?0:1;
    let u='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?headers='+hm+'&tqx=out:json;responseHandler:'+h+'&cb='+Date.now();
    if(sheet)u+='&sheet='+encodeURIComponent(sheet);
    const s=document.createElement('script');
    s.src=u;
    s.onerror=()=>{if(!done){done=true;cleanup();reject(t().liveTab(sheet||'RX')+' (network)')}};
    document.head.appendChild(s);
  });
}
